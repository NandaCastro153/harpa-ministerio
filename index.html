  const [uploaded, setUploaded]   = useState(null);
  const [jobId, setJobId]         = useState(null);
  const [status, setStatus]       = useState('idle'); // idle | uploading | processing | done | error
  const [progress, setProgress]   = useState(0);
  const [faixas, setFaixas]       = useState([]); // resultado real do Lalal
  const [mutes, setMutes]         = useState({});
  const [vols, setVols]           = useState({});
  const [tomOrig, setTomOrig]     = useState('Ré');
  const [tomDest, setTomDest]     = useState('Ré');
  const [workflow, setWorkflow]   = useState('stems-5');
  const [toast, setToast]         = useState('');
  const [lalalAtivo, setLalalAtivo] = useState(false);
  const [errMsg, setErrMsg]       = useState('');
  const fileRef  = useRef();
  const timerRef = useRef(null);
  const pollRef  = useRef(null);

  const showToast = msg => { setToast(msg); setTimeout(()=>setToast(''),3000); };

  const STEMS_POR_WORKFLOW = {
    'stems-4': [
      { id:'vocals', label:'Vocal',            cor:'#D85A30', bg:'rgba(216,90,48,0.15)',   icon:'mic'   },
      { id:'drums',  label:'Bateria',           cor:'#5DCAA5', bg:'rgba(93,202,165,0.15)',  icon:'music' },
      { id:'bass',   label:'Baixo',             cor:'#5B9BD5', bg:'rgba(91,155,213,0.15)',  icon:'music' },
      { id:'guitar', label:'Guitarra / Outros', cor:'#C8A84B', bg:'rgba(200,168,75,0.15)',  icon:'music' },
    ],
    'stems-5': [
      { id:'vocals', label:'Vocal',             cor:'#D85A30', bg:'rgba(216,90,48,0.15)',   icon:'mic'   },
      { id:'drums',  label:'Bateria',           cor:'#5DCAA5', bg:'rgba(93,202,165,0.15)',  icon:'music' },
      { id:'bass',   label:'Baixo',             cor:'#5B9BD5', bg:'rgba(91,155,213,0.15)',  icon:'music' },
      { id:'guitar', label:'Guitarra',          cor:'#C8A84B', bg:'rgba(200,168,75,0.15)',  icon:'music' },
      { id:'piano',  label:'Teclado / Piano',   cor:'#9B8EC4', bg:'rgba(155,142,196,0.15)', icon:'music' },
    ],
    'vocal-remover': [
      { id:'vocals',         label:'Vocal',        cor:'#D85A30', bg:'rgba(216,90,48,0.15)',   icon:'mic'   },
      { id:'accompaniment',  label:'Instrumental', cor:'#6BBF6A', bg:'rgba(107,191,106,0.15)', icon:'music' },
    ],
  };
  const stemsDemo = STEMS_POR_WORKFLOW[workflow] || STEMS_POR_WORKFLOW['stems-5'];

  const TONS_ORD = ['Dó','Dó#','Ré','Ré#','Mi','Fá','Fá#','Sol','Sol#','Lá','Lá#','Si'];
  const calcSemitons = (de, para) => {
    let d = TONS_ORD.indexOf(para) - TONS_ORD.indexOf(de);
    if (d > 6) d -= 12; if (d < -6) d += 12;
    return d;
  };
  const semitons = calcSemitons(tomOrig, tomDest);

  // ── Modo demo ────────────────────────────────────────────────
  const simularProcessamento = (file) => {
    setUploaded(file); setStatus('uploading'); setProgress(0); setErrMsg('');
    let p = 0;
    timerRef.current = setInterval(() => {
      p += 5; setProgress(p);
      if (p >= 30) {
        clearInterval(timerRef.current);
        setStatus('processing');
        timerRef.current = setInterval(() => {
          p += 2; setProgress(Math.min(p, 99));
          if (p >= 100) { clearInterval(timerRef.current); setProgress(100); setStatus('done'); setFaixas([]); }
        }, 80);
      }
    }, 200);
  };

  // ── Modo real Lalal ──────────────────────────────────────────
  const processarLalal = async (file) => {
    setUploaded(file); setStatus('uploading'); setProgress(10); setErrMsg(''); setFaixas([]);

    try {
      // 1. Upload para Supabase Storage
      const nomeArq = `studio/${Date.now()}_${file.name.replace(/\s+/g,'_')}`;
      const upRes = await fetch(`${SUPABASE_URL}/storage/v1/object/harpa-audio/${nomeArq}`, {
        method: 'POST',
        headers: { Authorization: `Bearer ${SUPABASE_ANON_KEY}`, 'Content-Type': file.type||'audio/mpeg', 'x-upsert':'true' },
        body: file,
      });
      if (!upRes.ok) throw new Error('Falha no upload do arquivo');
      const audioUrl = `${SUPABASE_URL}/storage/v1/object/public/harpa-audio/${nomeArq}`;
      setProgress(30);

      // 2. Cria job no Lalal via Edge Function
      const jobRes = await fetch(`${LALAL_FN}?action=upload`, {
        method: 'POST',
        headers: { Authorization: `Bearer ${SUPABASE_ANON_KEY}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ audioUrl, workflow, jobName: file.name }),
      });
      const jobData = await jobRes.json();
      if (jobData.error) throw new Error(jobData.error);

      setJobId(jobData.jobId);
      setStatus('processing');
      setProgress(35);

      // 3. Polling a cada 5 segundos
      pollRef.current = setInterval(async () => {
        try {
          const stRes = await fetch(`${LALAL_FN}?action=status&jobId=${jobData.jobId}`, {
            headers: { Authorization: `Bearer ${SUPABASE_ANON_KEY}` }
          });
          const st = await stRes.json();
          if (st.progress) setProgress(35 + Math.round(st.progress * 0.6));

          if (st.status === 'SUCCEEDED') {
            clearInterval(pollRef.current);
            const dlRes = await fetch(`${LALAL_FN}?action=download&jobId=${jobData.jobId}`, {
              headers: { Authorization: `Bearer ${SUPABASE_ANON_KEY}` }
            });
            const dl = await dlRes.json();
            setFaixas(dl.faixas || []);
            const defaultVols = {};
            (dl.faixas||[]).forEach(f => { defaultVols[f.id] = 80; });
            setVols(defaultVols);
            setProgress(100); setStatus('done');
          } else if (st.status === 'FAILED') {
            clearInterval(pollRef.current);
            setErrMsg('Falha no processamento. Tente novamente.');
            setStatus('error');
          }
        } catch(e) { clearInterval(pollRef.current); setErrMsg(e.message); setStatus('error'); }
      }, 5000);

    } catch(e) { setErrMsg(e.message); setStatus('error'); }
  };

  useEffect(() => () => { clearInterval(timerRef.current); clearInterval(pollRef.current); }, []);

  const handleFile = (file) => {
    if (lalalAtivo) processarLalal(file);
    else simularProcessamento(file);
  };

  const resetar = () => {
    clearInterval(timerRef.current); clearInterval(pollRef.current);
    setUploaded(null); setJobId(null); setStatus('idle');
    setProgress(0); setMutes({}); setFaixas([]); setErrMsg('');
  };

  const toggleMute = id => setMutes(m => ({...m,[id]:!m[id]}));

  const baixarFaixa = (faixa) => {
    if (faixa.url) {
      const a = document.createElement('a');
      a.href = faixa.url; a.download = `${faixa.label}.wav`; a.target = '_blank';
      a.click();
    } else showToast(`"${faixa.label}" — disponível após integração com Lalal.ai`);
  };

  // Stems para exibir — usa resultado real se disponível, senão usa demo
  const stemsExibir = status==='done' && faixas.length > 0
    ? faixas.map(f => ({
        id: f.id, label: f.label, url: f.url,
        cor: stemsDemo.find(s=>s.id===f.id)?.cor || '#C8A84B',
        bg:  stemsDemo.find(s=>s.id===f.id)?.bg  || 'rgba(200,168,75,0.15)',
        icon: 'music'
      }))
    : stemsDemo;

  const exportarTransposicao = () => {
    if (tomOrig === tomDest) { showToast('Selecione um tom destino diferente.'); return; }
    showToast(`Transposição ${tomOrig} → ${tomDest} (${semitons > 0 ? '+' : ''}${semitons} semitons) — disponível após integração`);
  };

  return (
    <div>
      {toast && <div className="toast">{toast}</div>}

      {/* Banner modo demo */}
      <div style={{
        background: lalalAtivo ? 'var(--teal-bg)' : 'rgba(200,168,75,0.08)',
        border: `0.5px solid ${lalalAtivo ? 'rgba(93,202,165,0.4)' : 'rgba(200,168,75,0.3)'}`,
        borderRadius:'var(--r)', padding:'12px 16px', marginBottom:16,
        display:'flex', alignItems:'center', justifyContent:'space-between', gap:12,
      }}>
        <div style={{display:'flex',alignItems:'flex-start',gap:10}}>
          <Icon name={lalalAtivo?'check':'info'} size={16} style={{color:lalalAtivo?'var(--teal)':'var(--gold)',flexShrink:0,marginTop:1}}/>
          <div>
            <div style={{fontSize:13,fontWeight:600,color:lalalAtivo?'var(--teal)':'var(--gold)'}}>
              {lalalAtivo ? 'Lalal.ai conectado' : 'Modo demonstração'}
            </div>
            <div style={{fontSize:11,color:'var(--text2)',marginTop:2}}>
              {lalalAtivo
                ? 'Separação real de faixas ativa via Lalal.ai.'
                : 'Interface completa e funcional. Configure a API Key do Lalal.ai em Configurações para ativar.'}
            </div>
          </div>
        </div>
        {!lalalAtivo && (
          <button className="btn btn-ghost btn-sm" style={{flexShrink:0}} onClick={()=>{ setLalalAtivo(true); showToast('Modo Lalal.ai ativado!'); }}>
            Ativar Lalal.ai
          </button>
        )}
      </div>

      {/* Seletor de workflow */}
      <div className="card" style={{marginBottom:14}}>
        <div className="card-title">Tipo de separação</div>
        <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
          {[
            { id:'stems-4', label:'4 faixas',    sub:'Vocal · Bateria · Baixo · Guitarra' },
            { id:'stems-5', label:'5 faixas ★',  sub:'+ Teclado separado (recomendado)' },
            { id:'vocal-remover', label:'Tirar vocal', sub:'Vocal · Instrumental' },
          ].map(w => (
            <div key={w.id}
              onClick={()=>{ if(status==='idle') setWorkflow(w.id); }}
              style={{
                flex:1, minWidth:140, padding:'10px 14px', borderRadius:'var(--r)',
                border:`1.5px solid ${workflow===w.id?'var(--gold)':'var(--border)'}`,
                background:workflow===w.id?'var(--gold-bg)':'var(--surface2)',
                cursor:status==='idle'?'pointer':'default', transition:'all 0.12s'
              }}
            >
              <div style={{fontSize:13,fontWeight:600,color:workflow===w.id?'var(--gold)':'var(--text)'}}>{w.label}</div>
              <div style={{fontSize:11,color:'var(--text3)',marginTop:2}}>{w.sub}</div>
            </div>
          ))}
        </div>
      </div>

      {/* Upload + resultado */}
      <div className="card" style={{marginBottom:14}}>

        {status === 'idle' && (
          <div className="upload-area"
            onClick={()=>fileRef.current.click()}
            onDragOver={e=>{e.preventDefault();e.currentTarget.style.borderColor='var(--gold)';}}
            onDragLeave={e=>{e.currentTarget.style.borderColor='';}}
            onDrop={e=>{e.preventDefault();e.currentTarget.style.borderColor='';const f=e.dataTransfer.files[0];if(f)handleFile(f);}}
          >
            <input ref={fileRef} type="file" accept="audio/*" style={{display:'none'}}
              onChange={e=>e.target.files[0]&&handleFile(e.target.files[0])}/>
            <Icon name="upload"/>
            <p>Arraste ou clique para carregar o áudio</p>
            <span>MP3, WAV, M4A · Máx 50 MB</span>
          </div>
        )}

        {status !== 'idle' && (
          <>
            {/* Info do arquivo */}
            <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:14,padding:'10px 12px',background:'var(--surface2)',borderRadius:'var(--r)'}}>
              <div className="musica-cover"><Icon name="music"/></div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:13,fontWeight:600,color:'var(--text)',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{uploaded?.name}</div>
                <div style={{fontSize:11,color:'var(--text3)'}}>{uploaded?(uploaded.size/1024/1024).toFixed(1)+' MB':''}</div>
              </div>
              {status==='uploading'  && <span className="tag tag-gold">Enviando...</span>}
              {status==='processing' && <span className="tag tag-gold">Processando {progress}%</span>}
              {status==='done'       && <span className="tag tag-teal">✓ Pronto</span>}
              <button className="btn btn-ghost btn-sm" onClick={resetar}><Icon name="x"/></button>
            </div>

            {/* Barra de progresso */}
            {(status==='uploading'||status==='processing') && (
              <div style={{marginBottom:16}}>
                <div style={{display:'flex',justifyContent:'space-between',fontSize:11,color:'var(--text3)',marginBottom:5}}>
                  <span>{status==='uploading'?'Enviando arquivo...':'IA separando as faixas...'}</span>
                  <span>{progress}%</span>
                </div>
                <div style={{height:5,background:'var(--dark4)',borderRadius:3,overflow:'hidden'}}>
                  <div style={{height:'100%',background:'var(--gold)',borderRadius:3,width:`${progress}%`,transition:'width 0.3s ease'}}/>
                </div>
                {status==='processing' && (
                  <div style={{fontSize:11,color:'var(--text3)',marginTop:6}}>
                    {progress < 50 ? 'Analisando estrutura da música...'
                     : progress < 80 ? 'Isolando instrumentos...'
                     : 'Finalizando separação...'}
                  </div>
                )}
              </div>
            )}

            {/* Faixas prontas */}
            {status==='done' && (
              <>
                <div style={{fontSize:13,fontWeight:600,color:'var(--text)',marginBottom:12}}>
                  Faixas separadas — {stemsExibir.length} pistas
                </div>
                {stemsExibir.map(stem => {
                  const vol = vols[stem.id] ?? 80;
                  const mutado = !!mutes[stem.id];
                  return (
                    <div key={stem.id} className="stem-row">
                      <div className="stem-icon" style={{background:stem.bg}}>
                        <Icon name={stem.icon} size={15} style={{color:stem.cor}}/>
                      </div>
                      <div className="stem-label">{stem.label}</div>
                      <div className="stem-bar-wrap" style={{opacity:mutado?0.3:1}} onClick={e=>{
                        const rect=e.currentTarget.getBoundingClientRect();
                        const pct=Math.round(((e.clientX-rect.left)/rect.width)*100);
                        setVols(v=>({...v,[stem.id]:pct}));
                      }}>
                        <div className="stem-bar-fill" style={{width:`${mutado?0:vol}%`,background:stem.cor}}/>
                      </div>
                      <span style={{fontSize:11,color:'var(--text3)',width:28,textAlign:'right',flexShrink:0}}>
                        {mutado?'—':vol}
                      </span>
                      <button
                        className={`stem-mute ${mutado?'muted':''}`}
                        title={mutado?'Reativar':'Mutar'}
                        onClick={()=>toggleMute(stem.id)}
                      >
                        <Icon name={mutado?'mute':'volume'} size={13} style={{color:mutado?'var(--coral)':'var(--text3)'}}/>
                      </button>
                      <button className="stem-mute" title="Baixar faixa" onClick={()=>baixarFaixa(stem)}>
                        <Icon name="download" size={13} style={{color:'var(--text3)'}}/>
                      </button>
                    </div>
                  );
                })}
                <button className="btn btn-gold" style={{width:'100%',justifyContent:'center',marginTop:14}} onClick={()=>stemsExibir.forEach(s=>baixarFaixa(s))}>
                  <Icon name="download"/>Baixar todas as faixas
                </button>
              </>
            )}
          </>
        )}
      </div>

      {/* Transposição */}
      <div className="card">
        <div className="card-title">Transposição de tom</div>
        <div style={{display:'flex',alignItems:'flex-start',gap:20,flexWrap:'wrap',marginBottom:14}}>
          <div>
            <div style={{fontSize:11,color:'var(--text3)',marginBottom:6}}>Tom original</div>
            <div style={{display:'flex',gap:4,flexWrap:'wrap',maxWidth:260}}>
              {TONS.map(t=><button key={t} className={`tom-key ${tomOrig===t?'active':''}`} style={{width:34,height:32,fontSize:11}} onClick={()=>setTomOrig(t)}>{t}</button>)}
            </div>
          </div>
          <div style={{paddingTop:24,fontSize:20,color:'var(--text3)'}}>→</div>
          <div>
            <div style={{fontSize:11,color:'var(--text3)',marginBottom:6}}>Tom destino</div>
            <div style={{display:'flex',gap:4,flexWrap:'wrap',maxWidth:260}}>
              {TONS.map(t=><button key={t} className={`tom-key ${tomDest===t?'active':''}`} style={{width:34,height:32,fontSize:11}} onClick={()=>setTomDest(t)}>{t}</button>)}
            </div>
          </div>
        </div>

        {tomOrig !== tomDest && (
          <div style={{padding:'10px 14px',background:'var(--gold-bg)',border:'0.5px solid rgba(200,168,75,0.3)',borderRadius:8,marginBottom:14,fontSize:12,color:'var(--text2)'}}>
            <strong style={{color:'var(--gold)'}}>{tomOrig}</strong> → <strong style={{color:'var(--teal)'}}>{tomDest}</strong>
            &nbsp;·&nbsp;
            <span style={{color:'var(--text3)'}}>{semitons > 0 ? `+${semitons}` : semitons} semiton{Math.abs(semitons)!==1?'s':''}</span>
            &nbsp;·&nbsp;
            <span style={{color:'var(--text3)'}}>{semitons > 0 ? 'subindo' : semitons < 0 ? 'descendo' : ''}</span>
          </div>
        )}

        <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
          <button className="btn btn-gold" onClick={exportarTransposicao} disabled={tomOrig===tomDest} style={{opacity:tomOrig===tomDest?0.4:1}}>
            <Icon name="download"/>Exportar com tom ajustado
          </button>
          <button className="btn btn-ghost" onClick={()=>{ setTomDest(tomOrig); showToast('Tom resetado.'); }}>
            Resetar
          </button>
        </div>
      </div>

      <style>{`
        @keyframes shimmer {
          0%   { opacity: 1; }
          50%  { opacity: 0.6; }
          100% { opacity: 1; }
        }
      `}</style>
    </div>
  );
}


function PageConfig({ membros }) {
  const [toast, setToast] = useState('');
  const [moisesKey, setMoisesKey] = useState('');
  const [salvandoKey, setSalvandoKey] = useState(false);
  const [testando, setTestando] = useState(false);
  const [statusSupabase, setStatusSupabase] = useState(null);
  const showToast = msg => { setToast(msg); setTimeout(()=>setToast(''),3000); };

  // Testa conexão com Supabase ao abrir a página
  useEffect(() => {
    async function testar() {
      try {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/`, {
          headers: { apikey: SUPABASE_ANON_KEY, Authorization: `Bearer ${SUPABASE_ANON_KEY}` }
        });
        setStatusSupabase(res.ok || res.status === 404 ? 'ok' : 'erro');
      } catch {
        setStatusSupabase('erro');
      }
    }
    if (SUPABASE_URL) testar();
  }, []);

  const salvarMoisesKey = async () => {
    if (!moisesKey.trim()) return;
    setSalvandoKey(true);
    try {
      // Salva via Edge Function (a key vai para os secrets do Supabase via CLI)
      // Aqui apenas confirmamos visualmente — o deploy da secret é feito via CLI
      await new Promise(r => setTimeout(r, 800));
      showToast('Cole a chave no terminal: supabase secrets set LALAL_API_KEY=' + moisesKey.slice(0,8) + '...');
      setMoisesKey('');
    } finally {
      setSalvandoKey(false);
    }
  };

  const testarStudio = async () => {
    setTestando(true);
    try {
      const res = await fetch(
        `${SUPABASE_URL}/functions/v1/moises?action=status&jobId=teste`,
        { headers: { Authorization: `Bearer ${SUPABASE_ANON_KEY}` } }
      );
      const data = await res.json();
      if (data.error === 'MOISES_API_KEY não configurada no Supabase') {
        showToast('⚠️ Edge Function ok, mas MOISES_API_KEY ainda não configurada.');
      } else if (res.status === 404 || data.error?.includes('jobId')) {
        showToast('✓ Edge Function respondendo corretamente!');
      } else {
        showToast('✓ Conectado! Edge Function funcionando.');
      }
    } catch {
      showToast('✗ Edge Function não encontrada. Verifique o deploy.');
    } finally {
      setTestando(false);
    }
  };

  return (
    <div>
      {toast && <div className="toast">{toast}</div>}

      <div className="settings-section">
        <div className="settings-title">Sobre o ministério</div>
        <div className="card">
          <div className="form-group">
            <label className="form-label">Nome do ministério</label>
            <input className="form-input" defaultValue="Ministério de Louvor" />
          </div>
          <div className="form-group">
            <label className="form-label">Igreja / Congregação</label>
            <input className="form-input" defaultValue="Igreja local" />
          </div>
          <div className="form-group">
            <label className="form-label">Líder principal</label>
            <input className="form-input" defaultValue="Pastor Éder" readOnly style={{opacity:0.7}}/>
          </div>
          <button className="btn btn-gold" onClick={()=>showToast('Configurações salvas!')}>
            <Icon name="check"/>Salvar
          </button>
        </div>
      </div>

      <div className="settings-section">
        <div className="settings-title">Supabase</div>
        <div className="card">
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}}>
            <div>
              <div style={{fontSize:13,fontWeight:600,color:'var(--text)'}}>tjolkkhfvleebtaoeraj.supabase.co</div>
              <div style={{fontSize:11,color:'var(--text3)',marginTop:2}}>Banco de dados e Storage configurados</div>
            </div>
            {statusSupabase === 'ok' && <span className="tag tag-teal">✓ Conectado</span>}
            {statusSupabase === 'erro' && <span className="tag tag-coral">✗ Erro</span>}
            {statusSupabase === null && <span className="tag tag-gray">Verificando...</span>}
          </div>
          <div style={{background:'var(--dark3)',borderRadius:8,padding:'10px 12px',fontSize:11,color:'var(--text3)',fontFamily:'monospace',wordBreak:'break-all'}}>
            URL: {SUPABASE_URL}<br/>
            Key: {SUPABASE_ANON_KEY.slice(0,24)}...
          </div>
        </div>
      </div>

      <div className="settings-section">
        <div className="settings-title">Integração Studio — Moises.ai</div>
        <div className="card">
          <div style={{marginBottom:14}}>
            <div style={{fontSize:13,fontWeight:600,color:'var(--text)',marginBottom:4}}>Status da Edge Function</div>
            <div style={{fontSize:12,color:'var(--text2)',marginBottom:10}}>
              A API Key do Lalal fica protegida nos secrets do Supabase — nunca exposta no navegador.
            </div>
            <div style={{display:'flex',gap:8}}>
              <button className="btn btn-ghost" onClick={testarStudio} disabled={testando}>
                {testando ? 'Testando...' : 'Testar conexão'}
              </button>
            </div>
          </div>

          <div className="divider"/>

          <div style={{fontSize:12,fontWeight:600,color:'var(--text)',marginBottom:8}}>
            Configurar API Key no Supabase
          </div>
          <div style={{background:'var(--dark3)',borderRadius:8,padding:'12px',fontSize:12,color:'var(--text2)',marginBottom:12,fontFamily:'monospace',lineHeight:1.8}}>
            <span style={{color:'var(--text3)'}}>// Execute no terminal:</span><br/>
            <span style={{color:'var(--teal)'}}>supabase</span> secrets set LALAL_API_KEY=<span style={{color:'var(--gold)'}}>sua_chave_aqui</span><br/>
            <span style={{color:'var(--teal)'}}>supabase</span> functions deploy moises
          </div>

          <div style={{fontSize:11,color:'var(--text3)'}}>
            Obtenha sua chave em <strong style={{color:'var(--text2)'}}>lalal.ai/api</strong>
          </div>
        </div>
      </div>

      <div className="settings-section">
        <div className="settings-title">Notificações</div>
        <div className="card">
          {['Avisar quando escalado','Lembrete 1 dia antes do culto','Notificar ao alterar tom ou repertório'].map((item,i) => (
            <div key={i} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'10px 0',borderBottom:i<2?'0.5px solid var(--border2)':'none'}}>
              <span style={{fontSize:13,color:'var(--text)'}}>{item}</span>
              <div style={{width:40,height:22,borderRadius:11,background:'var(--gold)',cursor:'pointer',position:'relative',flexShrink:0}}>
                <div style={{position:'absolute',top:3,right:3,width:16,height:16,borderRadius:'50%',background:'var(--dark)'}}/>
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ── APP PRINCIPAL ─────────────────────────────────────────────────

// ── Supabase client leve (sem SDK) ───────────────────────────────
const sb = {
  async get(tabela, ordem) {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/${tabela}?order=${ordem||'id'}&limit=500`, {
      headers: { apikey: SUPABASE_ANON_KEY, Authorization: `Bearer ${SUPABASE_ANON_KEY}` }
    });
    if (!res.ok) throw new Error(`Erro ao carregar ${tabela}`);
    return res.json();
  },
  async insert(tabela, dados) {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/${tabela}`, {
      method: 'POST',
      headers: { apikey: SUPABASE_ANON_KEY, Authorization: `Bearer ${SUPABASE_ANON_KEY}`, 'Content-Type': 'application/json', Prefer: 'return=representation' },
      body: JSON.stringify(dados)
    });
    if (!res.ok) { const e = await res.json(); throw new Error(e.message||'Erro ao salvar'); }
    const r = await res.json(); return Array.isArray(r) ? r[0] : r;
  },
  async update(tabela, id, dados) {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/${tabela}?id=eq.${id}`, {
      method: 'PATCH',
      headers: { apikey: SUPABASE_ANON_KEY, Authorization: `Bearer ${SUPABASE_ANON_KEY}`, 'Content-Type': 'application/json', Prefer: 'return=representation' },
      body: JSON.stringify(dados)
    });
    if (!res.ok) { const e = await res.json(); throw new Error(e.message||'Erro ao atualizar'); }
    const r = await res.json(); return Array.isArray(r) ? r[0] : r;
  },
  async delete(tabela, id) {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/${tabela}?id=eq.${id}`, {
      method: 'DELETE',
      headers: { apikey: SUPABASE_ANON_KEY, Authorization: `Bearer ${SUPABASE_ANON_KEY}` }
    });
    if (!res.ok) throw new Error('Erro ao excluir');
  }
};

const dbToApp = {
  membro: r => ({ id:r.id, nome:r.nome, papel:r.papel||'', funcoes:r.funcoes||[], cor:r.cor||'#C8A84B', tipo:r.tipo||'musico', pin:r.pin||'1234', acesso:r.acesso||'membro' }),
  escala: r => {
    let musicos = r.musicos || {};
    let repertorio = r.repertorio || [];
    if (typeof musicos === 'string') try { musicos = JSON.parse(musicos); } catch { musicos = {}; }
    if (typeof repertorio === 'string') try { repertorio = JSON.parse(repertorio); } catch { repertorio = []; }
    return {
      id: r.id,
      data: r.data || '',
      dia: r.dia || '',
      culto: r.culto || '',
      ceia: !!r.ceia,
      ministerio: r.ministerio || '',
      vocal: r.vocal || '',
      musicos,
      repertorio
    };
  },
  musica: r => ({ id:r.id, nome:r.nome, artista:r.artista||'', tom:r.tom||'Ré', bpm:r.bpm||0, youtubeId:r.youtube_id||'', capa:r.capa||'' }),
  aviso:  r => ({ id:r.id, titulo:r.titulo, corpo:r.corpo||'', tipo:r.tipo||'info', destinatario:r.destinatario||'todos', autor:r.autor||'', lido:false, data: new Date(r.criado_em).toLocaleDateString('pt-BR'), link:r.link||null, link_id:r.link_id||null, link_label:r.link_label||null }),
};
const appToDb = {
  membro: m => ({ nome:m.nome, papel:m.papel, funcoes:m.funcoes, cor:m.cor, tipo:m.tipo, pin:m.pin, acesso:m.acesso }),
  escala: e => ({ data:e.data, dia:e.dia, culto:e.culto, ceia:e.ceia, ministerio:e.ministerio, vocal:e.vocal, musicos:e.musicos, repertorio:e.repertorio }),
  musica: m => ({ nome:m.nome, artista:m.artista, tom:m.tom, bpm:m.bpm||null, youtube_id:m.youtubeId||null, capa:m.capa||null }),
  aviso:  a => ({ titulo:a.titulo, corpo:a.corpo, tipo:a.tipo, destinatario:a.destinatario, autor:a.autor||null, link:a.link||null, link_id:a.link_id||null, link_label:a.link_label||null }),
};

function App() {
  const [usuario, setUsuario]   = useState(null);
  const [page, setPage]         = useState('dashboard');
  const [carregando, setCarregando] = useState(true);
  const [erroDb, setErroDb]     = useState('');
  const [membros, setMembros]   = useState(MEMBROS);
  const [escalas, setEscalas]   = useState(ESCALAS_INICIAIS);
  const [musicas, setMusicas]   = useState(MUSICAS_INICIAIS);
  const [avisos,  setAvisos]    = useState(AVISOS_INICIAIS);
  const [playing, setPlaying]   = useState(false);
  const [currentTrack, setCurrentTrack] = useState(MUSICAS_INICIAIS[0]);
  const [progress, setProgress] = useState(35);
  const [playerMusica, setPlayerMusica] = useState(null); // mini player global

  const [statusLog, setStatusLog] = useState('Iniciando...');

  // Carrega tudo do Supabase
  useEffect(() => {
    async function carregar() {
      try {
        setStatusLog('Conectando ao banco...');
        const [dbM, dbE, dbMu, dbA] = await Promise.all([
          sb.get('membros','id'), sb.get('escalas','id'),
          sb.get('musicas','id'), sb.get('avisos','criado_em.desc'),
        ]);

        setStatusLog(`Banco: ${dbM.length} membros, ${dbE.length} escalas, ${dbMu.length} músicas, ${dbA.length} avisos`);

        // Membros
        if (dbM.length === 0) {
          for (const m of MEMBROS) {
            try { await sb.insert('membros', appToDb.membro(m)); } catch(e) { console.warn('membro:', e.message); }
          }
          const f = await sb.get('membros','id');
          setMembros(f.length > 0 ? f.map(dbToApp.membro) : MEMBROS);
        } else setMembros(dbM.map(dbToApp.membro));

        // Escalas
        if (dbE.length === 0) {
          for (const e of ESCALAS_INICIAIS) {
            try { await sb.insert('escalas', appToDb.escala(e)); } catch(e) { console.warn('escala:', e.message); }
          }
          const f = await sb.get('escalas','id');
          setEscalas(f.length > 0 ? f.map(dbToApp.escala) : ESCALAS_INICIAIS);
        } else setEscalas(dbE.map(dbToApp.escala));

        // Músicas
        if (dbMu.length === 0) {
          for (const m of MUSICAS_INICIAIS) {
            try { await sb.insert('musicas', appToDb.musica(m)); } catch(e) { console.warn('musica:', e.message); }
          }
          const f = await sb.get('musicas','id');
          setMusicas(f.length > 0 ? f.map(dbToApp.musica) : MUSICAS_INICIAIS);
        } else setMusicas(dbMu.map(dbToApp.musica));

        // Avisos
        if (dbA.length === 0) {
          for (const a of AVISOS_INICIAIS) {
            try { await sb.insert('avisos', appToDb.aviso(a)); } catch(e) { console.warn('aviso:', e.message); }
          }
          const f = await sb.get('avisos','criado_em.desc');
          setAvisos(f.length > 0 ? f.map(dbToApp.aviso) : AVISOS_INICIAIS);
        } else setAvisos(dbA.map(dbToApp.aviso));

        setErroDb('');
        setStatusLog('Pronto!');
      } catch(e) {
        console.error('Erro ao carregar:', e);
        setErroDb(e.message);
        setStatusLog('Erro: ' + e.message);
        setMembros(MEMBROS);
        setEscalas(ESCALAS_INICIAIS);
        setMusicas(MUSICAS_INICIAIS);
        setAvisos(AVISOS_INICIAIS);
      } finally {
        setCarregando(false);
      }
    }
    carregar();
  }, []);

  useEffect(() => {
    let t;
    if (playing) t = setInterval(() => setProgress(p => p >= 99 ? 0 : p + 0.3), 500);
    return () => clearInterval(t);
  }, [playing]);

  // ── Push Notifications ────────────────────────────────────────
  const registrarPush = async (nomeUsuario) => {
    try {
      if (!('serviceWorker' in navigator) || !('PushManager' in window)) return;
      const permissao = await Notification.requestPermission();
      if (permissao !== 'granted') return;

      const reg = await navigator.serviceWorker.ready;
      const sub = await reg.pushManager.subscribe({
        userVisibleOnly: true,
        applicationServerKey: VAPID_PUBLIC_KEY,
      });

      const subJson = sub.toJSON();
      // Salva no Supabase
      await fetch(`${SUPABASE_URL}/rest/v1/push_subscriptions`, {
        method: 'POST',
        headers: {
          apikey: SUPABASE_ANON_KEY,
          Authorization: `Bearer ${SUPABASE_ANON_KEY}`,
          'Content-Type': 'application/json',
          Prefer: 'resolution=ignore-duplicates',
        },
        body: JSON.stringify({
          membro_nome: nomeUsuario,
          endpoint: subJson.endpoint,
          p256dh: subJson.keys?.p256dh,
          auth: subJson.keys?.auth,
        }),
      });
      console.log('Push registrado para', nomeUsuario);
    } catch(e) {
      console.warn('Push não disponível:', e.message);
    }
  };

  const enviarPushNotificacao = async (titulo, corpo, destinatario = 'todos') => {
    try {
      await fetch(PUSH_FN, {
        method: 'POST',
        headers: {
          Authorization: `Bearer ${SUPABASE_ANON_KEY}`,
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({ titulo, corpo, destinatario }),
      });
    } catch(e) {
      console.warn('Erro ao enviar push:', e.message);
    }
  };
  const salvarMembro = async (m) => {
    try {
      if (m.id && m.id < 100000) { await sb.update('membros',m.id,appToDb.membro(m)); setMembros(ms=>ms.map(x=>x.id===m.id?m:x)); }
      else { const r=await sb.insert('membros',appToDb.membro(m)); m={...m,id:r.id}; setMembros(ms=>[...ms,m]); }
    } catch(e) { alert('Erro ao salvar membro: '+e.message); }
    return m;
  };

  const excluirMembro = async (id) => {
    try { await sb.delete('membros',id); setMembros(ms=>ms.filter(m=>m.id!==id)); } catch(e) { alert('Erro: '+e.message); }
  };

  const salvarEscala = async (e) => {
    try {
      if (e.id && e.id < 100000) { await sb.update('escalas',e.id,appToDb.escala(e)); setEscalas(es=>es.map(x=>x.id===e.id?e:x)); }
      else { const r=await sb.insert('escalas',appToDb.escala(e)); e={...e,id:r.id}; setEscalas(es=>[...es,e].sort((a,b)=>a.data.localeCompare(b.data))); }
    } catch(ex) { alert('Erro ao salvar escala: '+ex.message); }
    return e;
  };

  const excluirEscala = async (id) => {
    try { await sb.delete('escalas',id); setEscalas(es=>es.filter(e=>e.id!==id)); } catch(e) { alert('Erro: '+e.message); }
  };

  const atualizarRepertorioEscala = async (escaladId, repertorio) => {
    try { await sb.update('escalas',escaladId,{repertorio}); setEscalas(es=>es.map(e=>e.id===escaladId?{...e,repertorio}:e)); } catch(e) { alert('Erro: '+e.message); }
  };

  const salvarMusica = async (m) => {
    try {
      if (m.id && m.id < 100000) { await sb.update('musicas',m.id,appToDb.musica(m)); setMusicas(ms=>ms.map(x=>x.id===m.id?m:x)); }
      else { const r=await sb.insert('musicas',appToDb.musica(m)); m={...m,id:r.id}; setMusicas(ms=>[...ms,m]); }
    } catch(e) { alert('Erro ao salvar música: '+e.message); }
    return m;
  };

  const excluirMusica = async (id) => {
    try { await sb.delete('musicas',id); setMusicas(ms=>ms.filter(m=>m.id!==id)); } catch(e) { alert('Erro: '+e.message); }
  };

  const salvarAviso = async (a) => {
    try {
      if (a.id && a.id < 100000) {
        await sb.update('avisos',a.id,appToDb.aviso(a));
        setAvisos(as=>as.map(x=>x.id===a.id?{...x,...a}:x));
      } else {
        const r=await sb.insert('avisos',appToDb.aviso(a));
        a={...a,id:r.id,lido:false,data:'Agora'};
        setAvisos(as=>[a,...as]);
        // Dispara push para os destinatários
        enviarPushNotificacao(a.titulo, a.corpo, a.destinatario);
      }
    } catch(e) { alert('Erro ao salvar aviso: '+e.message); }
    return a;
  };

  const excluirAviso = async (id) => {
    try { await sb.delete('avisos',id); setAvisos(as=>as.filter(a=>a.id!==id)); } catch(e) { alert('Erro: '+e.message); }
  };

  // Tela de carregamento
  if (carregando) return (
    <div style={{minHeight:'100vh',background:'var(--dark)',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:16}}>
      <div style={{fontSize:48,color:'var(--gold)'}}>♪</div>
      <div style={{fontSize:16,fontWeight:600,color:'var(--gold)'}}>Harpa</div>
      <div style={{fontSize:13,color:'var(--text3)'}}>{statusLog}</div>
      {erroDb && <div style={{fontSize:11,color:'var(--coral)',maxWidth:280,textAlign:'center',marginTop:4}}>Erro: {erroDb}</div>}
    </div>
  );

  if (!usuario) return <TelaLogin membros={membros} onLogin={(u) => {
    setUsuario(u);
    registrarPush(u.nome);
  }}/>;
  const isAdmin    = usuario.acesso === 'admin';
  const isMinistro = usuario.acesso === 'admin' || usuario.acesso === 'ministro';

  // Filtra avisos: admin/ministro vê todos; membro vê só os seus
  const avisosVisiveis = isMinistro
    ? avisos
    : avisos.filter(a => !a.destinatario || a.destinatario === usuario.nome || a.destinatario === 'todos');

  const naoLidos = avisosVisiveis.filter(a=>!a.lido).length;

  const isMobile = window.innerWidth <= 680;

  const navItems = [
    { id:'dashboard', label:'Início',    icon:'dashboard', section:'geral' },
    { id:'avisos',    label:'Avisos',    icon:'bell',      section:'geral', badge: naoLidos>0?naoLidos:null },
    { id:'escalas',   label:'Escalas',  icon:'calendar',  section:'ministerio' },
    { id:'musicas',   label:'Músicas',  icon:'music',     section:'repertorio' },
    { id:'studio',    label:'Studio',   icon:'mic',       section:'repertorio' },
    { id:'ministros', label:'Membros',  icon:'users',     section:'ministerio', mobileHide: true },
    ...(isAdmin ? [{ id:'config', label:'Config', icon:'settings', section:'config', mobileHide: true }] : []),
  ].filter(item => !(isMobile && item.mobileHide));

  const sections = [
    { id:'geral',       label:'Geral' },
    { id:'ministerio',  label:'Ministério' },
    { id:'repertorio',  label:'Repertório' },
    ...(isAdmin ? [{ id:'config', label:'Sistema' }] : []),
  ];

  const pageTitles = {
    dashboard: { title:'Dashboard',       sub:'Visão geral do ministério' },
    avisos:    { title:'Avisos',           sub:'Comunicados e lembretes' },
    ministros: { title:'Ministros',        sub:`${membros.length} membros` },
    escalas:   { title:'Escalas',          sub:'Junho · Julho 2025' },
    musicas:   { title:'Músicas',          sub:`${musicas.length} músicas` },
    studio:    { title:'Studio',           sub:'Separação de faixas · Transposição' },
    config:    { title:'Configurações',    sub:'Ministério de Louvor' },
  };

  const fmt = v => {
    const s = Math.round(v * 4.32);
    return `${Math.floor(s/60)}:${(s%60).toString().padStart(2,'0')}`;
  };

  const initials = n => n.split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase();

  return (
    <div className="app-shell">
      {/* SIDEBAR */}
      <div className="sidebar">
        <div className="sidebar-logo">
          <div className="logo-icon">♪</div>
          <div>
            <div className="logo-name">Harpa</div>
            <div className="logo-sub">Ministério de Louvor</div>
          </div>
        </div>
        <div className="sidebar-nav">
          {isMobile ? (
            // Mobile: flat, sem seções
            navItems.map(item => (
              <button key={item.id}
                className={`nav-item ${page===item.id?'active':''}`}
                onClick={()=>setPage(item.id)}
                style={{position:'relative'}}
              >
                <Icon name={item.icon} size={20}/>
                <span>{item.label}</span>
                {item.badge && <span className="nav-badge">{item.badge}</span>}
              </button>
            ))
          ) : (
            // Desktop: com seções
            sections.map(sec => {
              const items = navItems.filter(n=>n.section===sec.id);
              if(!items.length) return null;
              return (
                <div key={sec.id}>
                  <div className="nav-section-label">{sec.label}</div>
                  {items.map(item => (
                    <button key={item.id} className={`nav-item ${page===item.id?'active':''}`} onClick={()=>setPage(item.id)}>
                      <Icon name={item.icon}/>
                      <span style={{flex:1}}>{item.label}</span>
                      {item.badge && <span className="nav-badge">{item.badge}</span>}
                    </button>
                  ))}
                </div>
              );
            })
          )}
        </div>
        <div className="sidebar-footer">
          <div className="user-row">
            <div className="user-av" style={{background:usuario.cor+'22',color:usuario.cor,border:`1px solid ${usuario.cor}44`}}>
              {initials(usuario.nome)}
            </div>
            <div style={{flex:1,minWidth:0}}>
              <div className="user-name" style={{whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{usuario.nome}</div>
              <div className="user-role">{usuario.papel}</div>
            </div>
            <button onClick={()=>{setUsuario(null);setPage('dashboard');}}
              style={{background:'none',border:'none',color:'var(--text3)',cursor:'pointer',padding:4,flexShrink:0}}
              title="Sair">
              <Icon name="x" size={14}/>
            </button>
          </div>
        </div>
      </div>

      {/* MAIN */}
      <div className="main-area">
        <div className="topbar">
          <div>
            <div className="topbar-title">{pageTitles[page]?.title}</div>
            <div className="topbar-sub">{pageTitles[page]?.sub}</div>
          </div>
          <div className="topbar-actions">
            {isAdmin && <span className="tag tag-gold" style={{fontSize:10,marginRight:4}}>Admin</span>}
            {!isAdmin && isMinistro && <span className="tag tag-purple" style={{fontSize:10,marginRight:4}}>Ministro</span>}
            <button className={`ctrl-btn ${naoLidos>0?'notif-dot':''}`} onClick={()=>setPage('avisos')}>
              <Icon name="bell" size={18}/>
            </button>
          </div>
        </div>

        <div className="page-content">
          {page==='dashboard' && <PageDashboard membros={membros} escalas={escalas} musicas={musicas} avisos={avisosVisiveis} onPage={setPage} usuario={usuario} onPlayMusica={setPlayerMusica}/>}
          {page==='avisos'    && <PageAvisos avisos={avisosVisiveis} setAvisos={setAvisos} salvarAviso={salvarAviso} excluirAviso={excluirAviso} usuario={usuario} membros={membros} onPage={setPage}/>}
          {page==='ministros' && <PageMinistros membros={membros} setMembros={setMembros} salvarMembro={salvarMembro} excluirMembro={excluirMembro} usuario={usuario}/>}
          {page==='escalas'   && <PageEscalas escalas={escalas} setEscalas={setEscalas} salvarEscala={salvarEscala} excluirEscala={excluirEscala} atualizarRepertorio={atualizarRepertorioEscala} membros={membros} musicas={musicas} avisos={avisos} setAvisos={setAvisos} salvarAviso={salvarAviso} usuario={usuario} onPlayMusica={setPlayerMusica}/>}
          {page==='musicas'   && <PageMusicas musicas={musicas} setMusicas={setMusicas} salvarMusica={salvarMusica} excluirMusica={excluirMusica} onPlay={m=>{setCurrentTrack(m);setPlaying(true);}} onPlayMusica={setPlayerMusica} usuario={usuario}/>}
          {page==='studio'    && <PageStudio/>}
          {page==='config'    && isAdmin && <PageConfig membros={membros}/>}
        </div>

        {/* Mini Player YouTube Global */}
        {playerMusica && <MiniPlayerYT musica={playerMusica} onClose={()=>setPlayerMusica(null)}/>}

        {/* MINI PLAYER */}
        <div className="mini-player">
          <div className="musica-cover" style={{width:36,height:36,borderRadius:8,flexShrink:0}}><Icon name="music"/></div>
          <div style={{width:140,flexShrink:0}}>
            <div style={{fontSize:13,fontWeight:600,color:'var(--text)',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{currentTrack.nome}</div>
            <div style={{fontSize:11,color:'var(--text3)'}}>{currentTrack.artista} · {currentTrack.tom}</div>
          </div>
          <div className="player-track">
            <div className="player-bar-wrap"><div className="player-bar-fill" style={{width:`${progress}%`}}/></div>
            <div className="player-times"><span>{fmt(progress/100)}</span><span>{fmt(1)}</span></div>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:4,flexShrink:0}}>
            <button className="ctrl-btn"><Icon name="prev"/></button>
            <button className="play-btn" onClick={()=>setPlaying(p=>!p)}><Icon name={playing?'pause':'play'}/></button>
            <button className="ctrl-btn"><Icon name="skip"/></button>
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
<!-- Service Worker para PWA -->
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').then(reg => {
      console.log('SW registrado:', reg.scope);

      // Verifica atualização ao abrir o app
      reg.update();

      // Quando uma nova versão está esperando, mostra aviso
      reg.addEventListener('updatefound', () => {
        const newSW = reg.installing;
        newSW.addEventListener('statechange', () => {
          if (newSW.state === 'installed' && navigator.serviceWorker.controller) {
            // Nova versão disponível — recarrega automaticamente
            newSW.postMessage({ type: 'SKIP_WAITING' });
            window.location.reload();
          }
        });
      });
    }).catch(e => console.log('SW erro:', e));

    // Recarrega quando o SW toma controle
    navigator.serviceWorker.addEventListener('controllerchange', () => {
      window.location.reload();
    });
  });
}
</script>
</body>
</html>
