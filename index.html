<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --gold: #C8A84B; --gold-light: #F5E9C4; --gold-dark: #8B6E2A; --gold-bg: rgba(200,168,75,0.12);
    --dark: #111009; --dark2: #1A1814; --dark3: #22201A; --dark4: #2A2720;
    --surface: #1E1C16; --surface2: #252219;
    --text: #F0ECD8; --text2: #B8B09A; --text3: #7A7468; --text4: #4A4840;
    --border: rgba(200,168,75,0.18); --border2: rgba(200,168,75,0.08); --border3: rgba(255,255,255,0.06);
    --teal: #5DCAA5; --teal-bg: rgba(93,202,165,0.12);
    --coral: #D85A30; --coral-bg: rgba(216,90,48,0.12);
    --purple: #9B8EC4; --purple-bg: rgba(155,142,196,0.12);
    --blue: #5B9BD5; --blue-bg: rgba(91,155,213,0.12);
    --green: #6BBF6A; --green-bg: rgba(107,191,106,0.12);
    --r: 10px; --r-lg: 14px;
    --sidebar: 210px;
  }
  html, body, #root { height: 100%; }
  body { background: var(--dark); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color: var(--text); overflow: hidden; }
  button { cursor: pointer; font-family: inherit; }
  input, select, textarea { font-family: inherit; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* Layout */
  .app-shell { display: flex; height: 100vh; }

  /* Sidebar */
  .sidebar { width: var(--sidebar); background: var(--dark2); border-right: 0.5px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; overflow: hidden; }
  .sidebar-logo { padding: 18px 16px 14px; display: flex; align-items: center; gap: 10px; border-bottom: 0.5px solid var(--border2); }
  .logo-icon { width: 34px; height: 34px; background: var(--gold); border-radius: 9px; display: flex; align-items: center; justify-content: center; font-size: 17px; flex-shrink: 0; }
  .logo-name { font-size: 16px; font-weight: 600; color: var(--gold); letter-spacing: 0.5px; }
  .logo-sub { font-size: 10px; color: var(--text3); }
  .sidebar-nav { flex: 1; overflow-y: auto; padding: 12px 10px; }
  .nav-section-label { font-size: 9px; color: var(--text4); text-transform: uppercase; letter-spacing: 1.2px; padding: 0 8px; margin: 12px 0 4px; }
  .nav-item { display: flex; align-items: center; gap: 9px; padding: 8px 10px; border-radius: 8px; font-size: 13px; color: var(--text2); cursor: pointer; transition: all 0.12s; margin-bottom: 1px; border: none; background: none; width: 100%; text-align: left; }
  .nav-item:hover { background: var(--border2); color: var(--text); }
  .nav-item.active { background: rgba(200,168,75,0.14); color: var(--gold); }
  .nav-item svg { width: 16px; height: 16px; flex-shrink: 0; }
  .nav-badge { margin-left: auto; background: var(--coral); color: #fff; font-size: 10px; padding: 1px 6px; border-radius: 8px; font-weight: 600; }
  .nav-badge.gold { background: var(--gold); color: var(--dark); }
  .sidebar-footer { padding: 12px 14px; border-top: 0.5px solid var(--border2); }
  .user-row { display: flex; align-items: center; gap: 8px; }
  .user-av { width: 28px; height: 28px; border-radius: 50%; background: var(--gold-bg); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; color: var(--gold); flex-shrink: 0; }
  .user-name { font-size: 12px; color: var(--text2); }
  .user-role { font-size: 10px; color: var(--text3); }

  /* Main */
  .main-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .topbar { background: var(--dark2); border-bottom: 0.5px solid var(--border); padding: 0 20px; height: 52px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .topbar-title { font-size: 15px; font-weight: 600; color: var(--text); }
  .topbar-sub { font-size: 11px; color: var(--text3); margin-top: 1px; }
  .topbar-actions { display: flex; align-items: center; gap: 8px; }
  .page-content { flex: 1; overflow-y: auto; padding: 20px; }

  /* Cards */
  .card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--r-lg); padding: 16px; }
  .card-title { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; }
  .card-title span { font-size: 11px; font-weight: 400; color: var(--text3); }

  /* Grid */
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }

  /* Stats */
  .stat-card { background: var(--surface2); border: 0.5px solid var(--border); border-radius: var(--r); padding: 14px 16px; }
  .stat-label { font-size: 11px; color: var(--text3); margin-bottom: 6px; }
  .stat-value { font-size: 26px; font-weight: 700; color: var(--text); line-height: 1; }
  .stat-detail { font-size: 11px; color: var(--text3); margin-top: 5px; }

  /* Buttons */
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 14px; border-radius: 8px; font-size: 12px; font-weight: 500; border: none; transition: all 0.12s; }
  .btn-gold { background: var(--gold); color: var(--dark); }
  .btn-gold:hover { opacity: 0.88; }
  .btn-ghost { background: transparent; color: var(--text2); border: 0.5px solid var(--border); }
  .btn-ghost:hover { background: var(--border2); color: var(--text); }
  .btn-danger { background: var(--coral-bg); color: var(--coral); border: 0.5px solid rgba(216,90,48,0.3); }
  .btn-sm { padding: 5px 10px; font-size: 11px; border-radius: 6px; }
  .btn svg { width: 14px; height: 14px; }

  /* Tags / Badges */
  .tag { display: inline-flex; align-items: center; font-size: 10px; padding: 2px 8px; border-radius: 6px; font-weight: 500; }
  .tag-gold { background: var(--gold-bg); color: var(--gold); }
  .tag-teal { background: var(--teal-bg); color: var(--teal); }
  .tag-coral { background: var(--coral-bg); color: var(--coral); }
  .tag-purple { background: var(--purple-bg); color: var(--purple); }
  .tag-blue { background: var(--blue-bg); color: var(--blue); }
  .tag-green { background: var(--green-bg); color: var(--green); }
  .tag-gray { background: var(--border2); color: var(--text3); }

  /* Avatar */
  .av { border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 600; flex-shrink: 0; }
  .av-sm { width: 28px; height: 28px; font-size: 11px; }
  .av-md { width: 36px; height: 36px; font-size: 13px; }
  .av-lg { width: 48px; height: 48px; font-size: 16px; }

  /* List items */
  .list-item { display: flex; align-items: center; gap: 10px; padding: 9px 0; border-bottom: 0.5px solid var(--border2); }
  .list-item:last-child { border: none; }
  .list-item-info { flex: 1; min-width: 0; }
  .list-item-name { font-size: 13px; color: var(--text); font-weight: 500; }
  .list-item-sub { font-size: 11px; color: var(--text3); margin-top: 1px; }

  /* Aviso banner */
  .aviso-banner { background: rgba(200,168,75,0.1); border: 0.5px solid rgba(200,168,75,0.4); border-radius: var(--r); padding: 14px 16px; margin-bottom: 16px; display: flex; gap: 12px; }
  .aviso-banner svg { width: 18px; height: 18px; color: var(--gold); flex-shrink: 0; margin-top: 1px; }
  .aviso-title { font-size: 13px; font-weight: 600; color: var(--gold); }
  .aviso-body { font-size: 12px; color: var(--text2); margin-top: 3px; }

  /* Ministro cards */
  .ministro-card { background: var(--surface2); border: 0.5px solid var(--border); border-radius: var(--r-lg); padding: 16px; text-align: center; transition: border-color 0.12s; cursor: pointer; }
  .ministro-card:hover { border-color: var(--gold); }
  .ministro-card .m-name { font-size: 13px; font-weight: 600; color: var(--text); margin: 8px 0 2px; }
  .ministro-card .m-role { font-size: 11px; color: var(--text3); margin-bottom: 8px; }
  .ministro-card .m-tags { display: flex; flex-wrap: wrap; gap: 4px; justify-content: center; }

  /* Escala */
  .escala-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--r-lg); overflow: hidden; margin-bottom: 12px; }
  .escala-header { background: var(--surface2); padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; border-bottom: 0.5px solid var(--border2); }
  .escala-date { font-size: 13px; font-weight: 600; color: var(--text); }
  .escala-culto { font-size: 11px; color: var(--text3); }
  .escala-body { padding: 12px 16px; }
  .escala-row { display: flex; align-items: center; gap: 8px; padding: 6px 0; border-bottom: 0.5px solid var(--border2); }
  .escala-row:last-child { border: none; }
  .escala-role-label { font-size: 11px; color: var(--text3); width: 110px; flex-shrink: 0; }
  .escala-names { font-size: 12px; color: var(--text); }

  /* Música */
  .musica-row { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 0.5px solid var(--border2); cursor: pointer; transition: background 0.1s; border-radius: 6px; padding: 8px 10px; margin: 0 -10px; }
  .musica-row:last-child { border: none; }
  .musica-row:hover { background: var(--border2); }
  .musica-num { width: 20px; font-size: 12px; color: var(--text4); text-align: center; flex-shrink: 0; }
  .musica-cover { width: 36px; height: 36px; border-radius: 7px; background: var(--dark4); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .musica-cover svg { width: 16px; height: 16px; color: var(--gold); }
  .musica-info { flex: 1; min-width: 0; }
  .musica-name { font-size: 13px; color: var(--text); font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .musica-artist { font-size: 11px; color: var(--text3); }
  .tom-pill { font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 6px; background: var(--gold-bg); color: var(--gold); flex-shrink: 0; }

  /* Studio */
  .stem-row { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 0.5px solid var(--border2); }
  .stem-row:last-child { border: none; }
  .stem-icon { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .stem-icon svg { width: 15px; height: 15px; }
  .stem-label { font-size: 13px; color: var(--text); width: 130px; flex-shrink: 0; }
  .stem-bar-wrap { flex: 1; height: 4px; background: var(--dark4); border-radius: 2px; overflow: hidden; cursor: pointer; }
  .stem-bar-fill { height: 100%; border-radius: 2px; transition: width 0.2s; }
  .stem-mute { width: 28px; height: 28px; border-radius: 6px; border: 0.5px solid var(--border); background: transparent; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.12s; }
  .stem-mute:hover { background: var(--border2); }
  .stem-mute.muted { background: var(--coral-bg); border-color: var(--coral); }
  .stem-mute svg { width: 13px; height: 13px; }

  /* Tom keys */
  .tom-key { width: 38px; height: 38px; border-radius: 8px; border: 0.5px solid var(--border); background: var(--surface); color: var(--text2); font-size: 12px; font-weight: 500; cursor: pointer; transition: all 0.12s; display: flex; align-items: center; justify-content: center; }
  .tom-key:hover { border-color: var(--gold); color: var(--gold); }
  .tom-key.active { background: var(--gold); color: var(--dark); border-color: var(--gold); }

  /* Calendar */
  .cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 3px; }
  .cal-th { font-size: 10px; color: var(--text4); text-align: center; padding: 4px 0; }
  .cal-day { aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 11px; color: var(--text3); border-radius: 6px; cursor: pointer; position: relative; }
  .cal-day:hover { background: var(--border2); }
  .cal-day.today { background: var(--gold-bg); color: var(--gold); font-weight: 700; }
  .cal-day.has-ev::after { content:''; display:block; width:4px; height:4px; border-radius:50%; background:var(--gold); position:absolute; bottom:3px; }
  .cal-day.other { opacity: 0.3; }
  .cal-day.selected { background: rgba(200,168,75,0.25); color: var(--gold); }

  /* Modal */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 20px; }
  .modal { background: var(--dark2); border: 0.5px solid var(--border); border-radius: var(--r-lg); padding: 24px; width: 100%; max-width: 480px; max-height: 80vh; overflow-y: auto; }
  .modal-title { font-size: 16px; font-weight: 600; color: var(--text); margin-bottom: 16px; display: flex; align-items: center; justify-content: space-between; }

  /* Form */
  .form-group { margin-bottom: 14px; }
  .form-label { font-size: 11px; color: var(--text3); margin-bottom: 5px; display: block; }
  .form-input { width: 100%; background: var(--dark3); border: 0.5px solid var(--border); border-radius: 8px; padding: 9px 12px; font-size: 13px; color: var(--text); outline: none; transition: border-color 0.12s; }
  .form-input:focus { border-color: var(--gold); }
  .form-select { width: 100%; background: var(--dark3); border: 0.5px solid var(--border); border-radius: 8px; padding: 9px 12px; font-size: 13px; color: var(--text); outline: none; }
  .form-select option { background: var(--dark3); }

  /* Upload area */
  .upload-area { border: 1px dashed var(--border); border-radius: var(--r); padding: 28px 20px; text-align: center; cursor: pointer; transition: border-color 0.12s; }
  .upload-area:hover { border-color: var(--gold); }
  .upload-area svg { width: 32px; height: 32px; color: var(--text3); margin-bottom: 8px; }
  .upload-area p { font-size: 13px; color: var(--text2); }
  .upload-area span { font-size: 11px; color: var(--text3); }

  /* Player */
  .mini-player { background: var(--dark2); border-top: 0.5px solid var(--border); padding: 10px 20px; display: flex; align-items: center; gap: 14px; flex-shrink: 0; height: 60px; }
  .player-track { flex: 2; }
  .player-bar-wrap { height: 3px; background: var(--dark4); border-radius: 2px; overflow: hidden; cursor: pointer; }
  .player-bar-fill { height: 100%; background: var(--gold); border-radius: 2px; transition: width 0.5s linear; }
  .player-times { display: flex; justify-content: space-between; font-size: 10px; color: var(--text3); margin-top: 4px; }
  .play-btn { width: 34px; height: 34px; border-radius: 50%; background: var(--gold); border: none; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: opacity 0.12s; }
  .play-btn:hover { opacity: 0.85; }
  .play-btn svg { width: 15px; height: 15px; color: var(--dark); }
  .ctrl-btn { background: none; border: none; color: var(--text3); display: flex; align-items: center; justify-content: center; transition: color 0.12s; padding: 4px; }
  .ctrl-btn:hover { color: var(--text); }
  .ctrl-btn svg { width: 18px; height: 18px; }

  /* Search */
  .search-wrap { position: relative; }
  .search-wrap svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); width: 14px; height: 14px; color: var(--text3); }
  .search-input { background: var(--dark3); border: 0.5px solid var(--border); border-radius: 8px; padding: 8px 12px 8px 32px; font-size: 12px; color: var(--text); outline: none; width: 200px; }
  .search-input:focus { border-color: var(--gold); }
  .search-input::placeholder { color: var(--text4); }

  /* Divider */
  .divider { height: 0.5px; background: var(--border2); margin: 16px 0; }

  /* Settings */
  .settings-section { margin-bottom: 24px; }
  .settings-title { font-size: 12px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 12px; }

  /* Notifications bell */
  .notif-dot { position: relative; }
  .notif-dot::after { content:''; position:absolute; top:2px; right:2px; width:7px; height:7px; background:var(--coral); border-radius:50%; border:1.5px solid var(--dark2); }

  /* Toast */
  .toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: var(--dark2); border: 0.5px solid var(--border); border-radius: 8px; padding: 10px 18px; font-size: 13px; color: var(--text); z-index: 200; box-shadow: 0 4px 20px rgba(0,0,0,0.4); animation: toastIn 0.2s ease; }
  @keyframes toastIn { from { opacity:0; transform: translateX(-50%) translateY(8px); } to { opacity:1; transform: translateX(-50%) translateY(0); } }

  /* ── MOBILE ────────────────────────────────────────────────── */
  @media (max-width: 680px) {

    .app-shell { flex-direction: column; }

    .sidebar {
      width: 100% !important;
      height: 58px;
      min-height: 58px;
      flex-direction: row;
      order: 2;
      border-right: none;
      border-top: 0.5px solid var(--border);
      overflow: visible;          /* era hidden — causava corte dos ícones */
      flex-shrink: 0;
      background: var(--dark2);
      z-index: 50;
    }

    .sidebar-logo   { display: none; }
    .sidebar-footer { display: none; }

    .sidebar-nav {
      display: flex;
      flex-direction: row;
      align-items: stretch;
      justify-content: space-around;
      width: 100%;
      padding: 0;
      overflow: visible;
    }

    .nav-section-label { display: none; }

    .nav-item {
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      padding: 6px 2px 4px;
      border-radius: 0;
      font-size: 9px;
      flex: 1;
      min-width: 0;
      position: relative;
      border-bottom: 2px solid transparent;
      margin: 0;
    }

    .nav-item.active {
      border-bottom: 2px solid var(--gold);
      background: transparent;
    }

    /* Ícones visíveis e bem dimensionados */
    .nav-item > span:first-child {
      width: 22px !important;
      height: 22px !important;
      flex-shrink: 0;
    }
    .nav-item svg { width: 22px !important; height: 22px !important; }

    /* Label de texto do item */
    .nav-item > span:last-child {
      display: block !important;
      font-size: 9px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 52px;
      text-align: center;
      line-height: 1.2;
    }

    .nav-badge {
      position: absolute;
      top: 2px;
      right: 6px;
      font-size: 8px;
      padding: 1px 4px;
      min-width: 14px;
      text-align: center;
      border-radius: 8px;
    }

    .main-area { flex: 1; min-height: 0; order: 1; overflow: hidden; }

    .topbar { height: 48px; padding: 0 14px; }
    .topbar-title { font-size: 14px; }
    .topbar-sub   { display: none; }

    .page-content { padding: 12px 12px 16px; }

    .grid-2, .grid-4 { grid-template-columns: 1fr !important; gap: 10px; }
    .grid-3 { grid-template-columns: 1fr 1fr !important; gap: 8px; }

    .card { padding: 12px; }

    .tom-key { width: 32px; height: 32px; font-size: 10px; }
    .stem-label { width: 80px; font-size: 11px; }

    .mini-player { padding: 8px 12px; height: 52px; gap: 8px; }
    .player-track { display: none; }

    .modal-overlay { padding: 0; align-items: flex-end; }
    .modal {
      max-width: 100% !important;
      max-height: 90vh;
      border-radius: 16px 16px 0 0;
      padding: 20px 16px 24px;
    }

    .toast { bottom: 74px; font-size: 12px; padding: 8px 14px; max-width: 88vw; text-align: center; }

    .btn { min-height: 38px; }

// ── Detecta função do membro em uma escala ───────────────────────
// Retorna array com todas as funções encontradas
function funcaoNaEscala(nomeUsuario, escala) {
  if (!nomeUsuario || !escala) return null;

  const normalizar = s => s?.toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .replace(/[^a-z0-9 ]/g,'').trim() || '';

  const nomeNorm = normalizar(nomeUsuario);
  const variacoes = new Set([nomeNorm]);

  nomeNorm.split(' ').filter(p => p.length > 2).forEach(p => {
    variacoes.add(p);
    if (p.length >= 4) variacoes.add(p.slice(0, 4));
    if (p.length >= 5) variacoes.add(p.slice(0, 5));
  });
  if (nomeNorm.includes('pastor') || nomeNorm.startsWith('pr')) {
    nomeNorm.split(' ').filter(p => p.length > 2 && !['pastor','pastora','pr'].includes(p)).forEach(p => {
      variacoes.add('pr-' + p);
      variacoes.add('pr ' + p);
    });
  }

  const bate = (campo) => {
    if (!campo) return false;
    const c = normalizar(campo);
    return [...variacoes].some(v => v.length >= 3 && c.includes(v));
  };

  // Coleta TODAS as funções onde o membro aparece
  const funcoes = [];
  if (bate(escala.ministerio))        funcoes.push('Ministro(a)');
  if (bate(escala.vocal))             funcoes.push('Vocal / Back');
  if (bate(escala.musicos?.guitarra)) funcoes.push('Guitarra');
  if (bate(escala.musicos?.teclado))  funcoes.push('Teclado');
  if (bate(escala.musicos?.baixo))    funcoes.push('Baixo');
  if (bate(escala.musicos?.bateria))  funcoes.push('Bateria');
  if (bate(escala.musicos?.violao))   funcoes.push('Violão');

  return funcoes.length > 0 ? funcoes.join(' · ') : null;
}

// Converte "DD/MM/AAAA" para objeto Date — robusto
function parseData(str) {
  if (!str) return new Date(0);
  // Remove espaços e divide
  const partes = str.trim().split('/');
  if (partes.length < 3) return new Date(0);
  const d = parseInt(partes[0], 10);
  const m = parseInt(partes[1], 10);
  const a = parseInt(partes[2], 10);
  // new Date(ano, mes-1, dia) — sem timezone
  const dt = new Date(a, m - 1, d, 12, 0, 0, 0); // meio-dia para evitar DST
  return isNaN(dt.getTime()) ? new Date(0) : dt;
}

// Retorna escalas futuras (hoje inclusive) onde o usuário aparece, ordenadas por data
function escalasDoUsuario(nomeUsuario, escalas) {
  const agora = new Date();
  // Compara só a data, sem hora
  const hojeMs = new Date(agora.getFullYear(), agora.getMonth(), agora.getDate()).getTime();
  return escalas
    .filter(e => {
      const temFuncao = funcaoNaEscala(nomeUsuario, e) !== null;
      const dataMs = parseData(e.data).getTime();
      return temFuncao && dataMs >= hojeMs;
    })
    .sort((a, b) => parseData(a.data).getTime() - parseData(b.data).getTime());
}

// Próxima escala geral (qualquer pessoa), filtrando passadas
function proximaEscalaGeral(escalas) {
  const agora = new Date();
  const hojeMs = new Date(agora.getFullYear(), agora.getMonth(), agora.getDate()).getTime();
  return escalas
    .filter(e => parseData(e.data).getTime() >= hojeMs)
    .sort((a, b) => parseData(a.data).getTime() - parseData(b.data).getTime())[0] || null;
}

// ── Mini Player Global ────────────────────────────────────────────
function MiniPlayerYT({ musica, onClose }) {
  const [videoId, setVideoId] = useState(musica?.youtubeId || null);
  const [buscando, setBuscando] = useState(!musica?.youtubeId);
  const [erro, setErro] = useState('');

  useEffect(() => {
    if (musica?.youtubeId) {
      setVideoId(musica.youtubeId);
      setBuscando(false);
      return;
    }
    // Busca o ID no YouTube
    async function buscar() {
      setBuscando(true);
      setErro('');
      try {
        const q = encodeURIComponent(`${musica.nome} ${musica.artista} louvor`);
        const res = await fetch(
          `https://www.googleapis.com/youtube/v3/search?part=snippet&q=${q}&type=video&maxResults=1&key=${YOUTUBE_API_KEY}`
        );
        const data = await res.json();
        const id = data.items?.[0]?.id?.videoId;
        if (id) setVideoId(id);
        else setErro('Vídeo não encontrado.');
      } catch {
        setErro('Erro ao buscar vídeo.');
      } finally {
        setBuscando(false);
      }
    }
    buscar();
  }, [musica?.id]);

  if (!musica) return null;

  return (
    <div style={{
      position:'fixed', bottom:60, left:0, right:0, zIndex:150,
      background:'var(--dark2)', borderTop:'0.5px solid var(--border)',
      boxShadow:'0 -4px 24px rgba(0,0,0,0.5)'
    }}>
      {/* Header */}
      <div style={{display:'flex',alignItems:'center',gap:10,padding:'8px 14px',borderBottom:'0.5px solid var(--border2)'}}>
        {musica.capa
          ? <img src={musica.capa} alt="" style={{width:32,height:32,borderRadius:5,objectFit:'cover',flexShrink:0}}/>
          : <div style={{width:32,height:32,borderRadius:5,background:'var(--dark4)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
              <Icon name="music" size={14} style={{color:'var(--gold)'}}/>
            </div>
        }
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:13,fontWeight:600,color:'var(--text)',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{musica.nome}</div>
          <div style={{fontSize:11,color:'var(--text3)'}}>{musica.artista} · Tom: {musica.tom}</div>
        </div>
        <button onClick={onClose} style={{background:'none',border:'none',color:'var(--text3)',cursor:'pointer',padding:4,flexShrink:0}}>
          <Icon name="x" size={16}/>
        </button>
      </div>

      {/* Conteúdo */}
      {buscando && (
        <div style={{padding:'24px',textAlign:'center',color:'var(--text3)',fontSize:13}}>
          Buscando vídeo...
        </div>
      )}
      {erro && (
        <div style={{padding:'16px',textAlign:'center',color:'var(--coral)',fontSize:13}}>
          {erro}
          <div style={{marginTop:8}}>
            <a href={`https://www.youtube.com/results?search_query=${encodeURIComponent(musica.nome+' '+musica.artista)}`}
              target="_blank" rel="noreferrer"
              style={{color:'var(--gold)',fontSize:12}}>
              Buscar no YouTube ↗
            </a>
          </div>
        </div>
      )}
      {!buscando && !erro && videoId && (
        <div style={{position:'relative',paddingBottom:'56.25%',height:0,overflow:'hidden'}}>
          <iframe
            src={`https://www.youtube.com/embed/${videoId}?autoplay=1&rel=0`}
            style={{position:'absolute',top:0,left:0,width:'100%',height:'100%',border:'none'}}
            allow="autoplay; encrypted-media; picture-in-picture"
            allowFullScreen
          />
        </div>
      )}
    </div>
  );
}

function PageAvisos({ avisos, setAvisos, salvarAviso, excluirAviso, usuario, membros, onPage }) {
  const [modal, setModal] = useState(false);
  const [editando, setEditando] = useState(null);
  const [form, setForm] = useState({ titulo:'', corpo:'', tipo:'info', destinatario:'todos' });
  const [salvando, setSalvando] = useState(false);
  const [toast, setToast] = useState('');
  const showToast = msg => { setToast(msg); setTimeout(()=>setToast(''),2500); };

  const isAdmin    = usuario?.acesso === 'admin';
  const isMinistro = isAdmin || usuario?.acesso === 'ministro';

  const marcarLido = id => setAvisos(a => a.map(x => x.id===id ? {...x,lido:true} : x));
  const marcarTodos = () => setAvisos(a => a.map(x => ({...x,lido:true})));

  const excluir = async (id) => {
    await excluirAviso(id);
    showToast('Aviso removido.');
  };

  const abrirNovo = () => {
    setEditando(null);
    setForm({ titulo:'', corpo:'', tipo:'info', destinatario:'todos' });
    setModal(true);
  };

  const abrirEditar = (a) => {
    setEditando(a);
    setForm({ titulo:a.titulo, corpo:a.corpo, tipo:a.tipo, destinatario:a.destinatario||'todos' });
    setModal(true);
  };

  const salvar = async () => {
    if (!form.titulo.trim()) return;
    setSalvando(true);
    try {
      await salvarAviso({ ...(editando||{}), ...form, autor: usuario?.nome });
      showToast(editando ? 'Aviso atualizado!' : 'Aviso enviado!');
      setModal(false);
    } catch(e) { showToast('Erro: '+e.message); }
    finally { setSalvando(false); }
  };

  return (
    <div>
      {toast && <div className="toast">{toast}</div>}
      <div style={{display:'flex',gap:8,marginBottom:14,alignItems:'center'}}>
        {isMinistro && (
          <button className="btn btn-gold" onClick={abrirNovo}>
            <Icon name="plus"/>Novo aviso
          </button>
        )}
        {avisos.some(a=>!a.lido) && (
          <button className="btn btn-ghost btn-sm" onClick={marcarTodos}>
            <Icon name="check"/>Marcar todos lidos
          </button>
        )}
      </div>

      <div style={{display:'flex',flexDirection:'column',gap:10}}>
        {avisos.map(a => (
          <div key={a.id} className="card" style={{
            borderLeft:`3px solid ${a.tipo==='alerta'?'var(--gold)':'var(--blue)'}`,
            borderRadius:'0 var(--r-lg) var(--r-lg) 0',
            opacity:a.lido?0.55:1
          }}>
            <div style={{display:'flex',gap:10}}>
              <Icon name={a.tipo==='alerta'?'alert':'info'} size={17}
                style={{color:a.tipo==='alerta'?'var(--gold)':'var(--blue)',flexShrink:0,marginTop:2}}/>
              <div style={{flex:1}}>
                <div style={{fontSize:13,fontWeight:600,color:a.tipo==='alerta'?'var(--gold)':'var(--text)'}}>{a.titulo}</div>
                <div style={{fontSize:12,color:'var(--text2)',marginTop:3}}>{a.corpo}</div>
                {a.destinatario && a.destinatario !== 'todos' && (
                  <div style={{fontSize:11,color:'var(--text3)',marginTop:4}}>
                    Para: <strong style={{color:'var(--text2)'}}>{a.destinatario}</strong>
                  </div>
                )}
                {/* Link clicável para a seção */}
                {a.link && onPage && (
                  <button
                    onClick={()=>{ marcarLido(a.id); onPage(a.link); }}
                    style={{display:'inline-flex',alignItems:'center',gap:5,marginTop:8,background:'var(--gold-bg)',border:'0.5px solid rgba(200,168,75,0.3)',borderRadius:6,padding:'5px 10px',cursor:'pointer',fontSize:12,color:'var(--gold)',fontWeight:500}}
                  >
                    <Icon name="calendar" size={13}/>
                    {a.link_label || 'Ver detalhes'} →
                  </button>
                )}
                <div style={{display:'flex',gap:8,marginTop:10,flexWrap:'wrap'}}>
                  {!a.lido && (
                    <button className="btn btn-gold btn-sm" onClick={()=>marcarLido(a.id)}>
                      <Icon name="check"/>Lido
                    </button>
                  )}
                  {isMinistro && (
                    <button className="btn btn-ghost btn-sm" onClick={()=>abrirEditar(a)}>
                      <Icon name="edit"/>Editar
                    </button>
                  )}
                  {isAdmin && (
                    <button className="btn btn-danger btn-sm" onClick={()=>excluir(a.id)}>
                      <Icon name="trash"/>Excluir
                    </button>
                  )}
                </div>
              </div>
              <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:6,flexShrink:0}}>
                <div style={{fontSize:10,color:'var(--text3)'}}>{a.data}</div>
              </div>
            </div>
          </div>
        ))}
        {avisos.length === 0 && (
          <div className="card" style={{textAlign:'center',padding:32,color:'var(--text3)'}}>
            Nenhum aviso no momento.
          </div>
        )}
      </div>

      {modal && (
        <div className="modal-overlay" onClick={e=>{if(e.target.classList.contains('modal-overlay'))setModal(false)}}>
          <div className="modal">
            <div className="modal-title">
              {editando?'Editar aviso':'Novo aviso'}
              <button className="btn btn-ghost btn-sm" onClick={()=>setModal(false)}><Icon name="x"/></button>
            </div>
            <div className="form-group">
              <label className="form-label">Tipo</label>
              <div style={{display:'flex',gap:8}}>
                {['info','alerta'].map(t=>(
                  <button key={t} className={`btn btn-sm ${form.tipo===t?'btn-gold':'btn-ghost'}`}
                    onClick={()=>setForm(f=>({...f,tipo:t}))}>
                    {t==='alerta'?'⚠ Alerta':'ℹ Info'}
                  </button>
                ))}
              </div>
            </div>
            <div className="form-group">
              <label className="form-label">Título</label>
              <input className="form-input" placeholder="Ex: Ensaio sábado 19h"
                value={form.titulo} onChange={e=>setForm(f=>({...f,titulo:e.target.value}))} autoFocus/>
            </div>
            <div className="form-group">
              <label className="form-label">Mensagem</label>
              <textarea className="form-input" rows={3} placeholder="Detalhes..."
                value={form.corpo} onChange={e=>setForm(f=>({...f,corpo:e.target.value}))}
                style={{resize:'vertical'}}/>
            </div>
            <div className="form-group">
              <label className="form-label">Destinatário</label>
              <select className="form-select" value={form.destinatario}
                onChange={e=>setForm(f=>({...f,destinatario:e.target.value}))}>
                <option value="todos">📢 Todos</option>
                <optgroup label="Membros">
                  {(membros||[]).map(m=><option key={m.id} value={m.nome}>{m.nome}</option>)}
                </optgroup>
              </select>
            </div>
            <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}>
              <button className="btn btn-ghost" onClick={()=>setModal(false)}>Cancelar</button>
              <button className="btn btn-gold" onClick={salvar} disabled={salvando}>
                <Icon name="send"/>{salvando ? 'Salvando...' : editando?'Salvar':'Enviar'}
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}


function PageMinistros({ membros, setMembros, salvarMembro, excluirMembro, usuario }) {
  const [busca, setBusca] = useState('');
  const [modal, setModal] = useState(false);
  const [form, setForm] = useState({ nome:'', papel:'', funcoes:'' });
  const [toast, setToast] = useState('');

  const showToast = msg => { setToast(msg); setTimeout(()=>setToast(''),2500); };

  const filtrados = membros.filter(m =>
    m.nome.toLowerCase().includes(busca.toLowerCase()) ||
    m.papel.toLowerCase().includes(busca.toLowerCase())
  );

  const cores = ['#C8A84B','#D85A30','#7F77DD','#5DCAA5','#ED93B1','#5B9BD5','#6BBF6A','#EF9F27','#D4537E','#534AB7'];
  const [salvando, setSalvando] = useState(false);

  const salvar = async () => {
    if (!form.nome.trim()) return;
    setSalvando(true);
    try {
      const novo = {
        nome: form.nome, papel: form.papel,
        funcoes: form.funcoes.split(',').map(f=>f.trim()).filter(Boolean),
        cor: cores[membros.length % cores.length], tipo: 'musico',
        pin: '1234', acesso: 'membro'
      };
      await salvarMembro(novo);
      setModal(false);
      setForm({ nome:'', papel:'', funcoes:'' });
      showToast(`${form.nome} adicionado(a)!`);
    } catch(e) { showToast('Erro: '+e.message); }
    finally { setSalvando(false); }
  };

  const tipoLabel = { liderança:'Liderança', ministro:'Ministros', musico:'Músicos e Backing' };
  const grupos = ['liderança','ministro','musico'];

  return (
    <div>
      {toast && <div className="toast">{toast}</div>}
      <div style={{display:'flex',gap:8,marginBottom:16}}>
        <div className="search-wrap" style={{flex:1}}>
          <Icon name="search"/>
          <input className="search-input" style={{width:'100%'}} placeholder="Buscar ministro..." value={busca} onChange={e=>setBusca(e.target.value)}/>
        </div>
        <button className="btn btn-gold" onClick={()=>setModal(true)}>
          <Icon name="plus"/>Novo membro
        </button>
      </div>

      {grupos.map(tipo => {
        const grupo = filtrados.filter(m=>m.tipo===tipo);
        if (!grupo.length) return null;
        return (
          <div key={tipo} style={{marginBottom:20}}>
            <div style={{fontSize:11,color:'var(--text3)',marginBottom:10,fontWeight:600,textTransform:'uppercase',letterSpacing:'0.8px'}}>{tipoLabel[tipo]}</div>
            <div className="grid-3">
              {grupo.map(m => (
                <div key={m.id} className="ministro-card">
                  <Avatar membro={m} size="lg"/>
                  <div className="m-name">{m.nome}</div>
                  <div className="m-role">{m.papel}</div>
                  <div className="m-tags">
                    {m.funcoes.map((f,i) => <span key={i} className="tag tag-gray">{f}</span>)}
                  </div>
                </div>
              ))}
            </div>
          </div>
        );
      })}

      {modal && (
        <div className="modal-overlay" onClick={e=>{if(e.target.classList.contains('modal-overlay'))setModal(false)}}>
          <div className="modal">
            <div className="modal-title">
              Novo membro
              <button className="btn btn-ghost btn-sm" onClick={()=>setModal(false)}><Icon name="x"/></button>
            </div>
            <div className="form-group">
              <label className="form-label">Nome completo</label>
              <input className="form-input" placeholder="Ex: Maria dos Santos" value={form.nome} onChange={e=>setForm(f=>({...f,nome:e.target.value}))}/>
            </div>
            <div className="form-group">
              <label className="form-label">Função principal</label>
              <input className="form-input" placeholder="Ex: Ministra de Louvor" value={form.papel} onChange={e=>setForm(f=>({...f,papel:e.target.value}))}/>
            </div>
            <div className="form-group">
              <label className="form-label">Instrumentos / funções (separados por vírgula)</label>
              <input className="form-input" placeholder="Ex: Guitarra, Violão" value={form.funcoes} onChange={e=>setForm(f=>({...f,funcoes:e.target.value}))}/>
            </div>
            <div style={{display:'flex',gap:8,justifyContent:'flex-end',marginTop:4}}>
              <button className="btn btn-ghost" onClick={()=>setModal(false)}>Cancelar</button>
              <button className="btn btn-gold" onClick={salvar}><Icon name="check"/>Salvar</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function PageEscalas({ escalas, setEscalas, salvarEscala, excluirEscala, atualizarRepertorio, membros, musicas, avisos, setAvisos, salvarAviso, usuario }) {
  const isAdmin    = usuario?.acesso === 'admin';
  const isMinistro = isAdmin || usuario?.acesso === 'ministro';

  const [sel, setSel] = useState(escalas[0]);
  const [mesCal, setMesCal] = useState(6);
  const [toast, setToast] = useState('');
  const [abaDir, setAbaDir] = useState('time');
  const [modalMusica, setModalMusica] = useState(false);
  const [musicaBusca, setMusicaBusca] = useState('');
  const [editTom, setEditTom] = useState(null);
  const [modalEscala, setModalEscala] = useState(false);
  const [editandoEscala, setEditandoEscala] = useState(null);
  const [salvandoEscala, setSalvandoEscala] = useState(false);
  const NOMES = membros.map(m=>m.nome);
  const formEscalaBase = { data:'', dia:'Domingo', culto:'2 cultos', ceia:false, ministerio:'', vocal:'', musicos:{ baixo:'', guitarra:'', teclado:'', bateria:'' }};
  const [formEscala, setFormEscala] = useState(formEscalaBase);
  const showToast = msg => { setToast(msg); setTimeout(()=>setToast(''),3000); };

  const abrirNovaEscala = () => {
    setEditandoEscala(null);
    setFormEscala(formEscalaBase);
    setModalEscala(true);
  };

  const abrirEditarEscala = (e) => {
    setEditandoEscala(e);
    setFormEscala({ data:e.data, dia:e.dia, culto:e.culto, ceia:e.ceia||false, ministerio:e.ministerio||'', vocal:e.vocal||'', musicos:{...e.musicos} });
    setModalEscala(true);
  };

  const salvarEscalaLocal = async () => {
    if (!formEscala.data.trim()) return;
    setSalvandoEscala(true);
    try {
      const base = editandoEscala ? {...editandoEscala,...formEscala} : {...formEscala, repertorio:[]};
      const salva = await salvarEscala(base);
      setSel(salva || base);
      showToast(editandoEscala ? 'Escala atualizada!' : 'Escala criada!');
      setModalEscala(false);
    } catch(e) { showToast('Erro: '+e.message); }
    finally { setSalvandoEscala(false); }
  };

  const excluirEscalaLocal = async (id) => {
    await excluirEscala(id);
    if (sel?.id===id) setSel(escalas.find(e=>e.id!==id)||null);
    showToast('Escala excluída.');
  };

  const dias = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
  const calDays = (() => {
    const ano = 2026;
    const diasNoMes = mesCal === 6 ? 30 : 31;
    const primeiroDia = new Date(ano, mesCal - 1, 1).getDay(); // 0=Dom
    const vazios = Array.from({length: primeiroDia}, (_, i) => {
      const d = new Date(ano, mesCal - 1, 1 - (primeiroDia - i));
      return { d: d.getDate(), other: true };
    });
    const diasArr = Array.from({length: diasNoMes}, (_, i) => ({ d: i + 1, other: false }));
    return [...vazios, ...diasArr];
  })();
  const hasEscala = d => escalas.some(e=>{const p=e.data.split('/');return parseInt(p[0])===d&&parseInt(p[1])===mesCal;});
  const isCeia = d => escalas.some(e=>{const p=e.data.split('/');return parseInt(p[0])===d&&parseInt(p[1])===mesCal&&e.ceia;});

  // Seleciona escala e sincroniza estado local
  const selecionarEscala = e => { setSel(e); setAbaDir('time'); };

  // Retorna a escala atualizada do state (sel pode estar desatualizado)
  const selAtual = escalas.find(e=>e.id===sel?.id) || sel;

  // Monta lista de nomes da banda da escala para notificação
  const nomesEquipe = e => {
    const partes = [e.ministerio, e.vocal, e.musicos?.baixo, e.musicos?.guitarra, e.musicos?.teclado, e.musicos?.bateria];
    return partes.filter(Boolean).join(', ');
  };

  const notificarRepertorio = async (escala, repertorio) => {
    if (!repertorio?.length) { showToast('Adicione músicas ao repertório antes de notificar.'); return; }
    const lista = repertorio.map((m,i) => `${i+1}. ${m.nome} (${m.tom})`).join(' · ');
    const titulo = `Repertório atualizado — ${escala.dia} ${escala.data}`;
    const corpo = `Culto: ${escala.culto}. Músicas: ${lista}`;
    await salvarAviso({
      titulo, corpo, tipo:'info', destinatario:'todos', autor: usuario?.nome||'',
      link: 'escalas',           // página de destino
      link_id: String(escala.id), // ID da escala para selecionar
      link_label: `Ver escala — ${escala.data}`,
    });
    showToast('Repertório enviado para a equipe!');
  };

  const adicionarMusica = async musica => {
    const novaEntrada = { id: Date.now(), musicaId: musica.id, nome: musica.nome, artista: musica.artista, tom: musica.tom };
    const novoRep = [...(selAtual.repertorio||[]), novaEntrada];
    await atualizarRepertorio(selAtual.id, novoRep);
    setModalMusica(false);
    setMusicaBusca('');
    showToast(`"${musica.nome}" adicionada!`);
  };

  const removerMusica = async entrada => {
    const novoRep = (selAtual.repertorio||[]).filter(r=>r.id!==entrada.id);
    await atualizarRepertorio(selAtual.id, novoRep);
    showToast(`"${entrada.nome}" removida.`);
  };

  const alterarTom = async (entrada, novoTom) => {
    const novoRep = (selAtual.repertorio||[]).map(r=>r.id===entrada.id?{...r,tom:novoTom}:r);
    await atualizarRepertorio(selAtual.id, novoRep);
    setEditTom(null);
    showToast(`Tom alterado para ${novoTom}.`);
  };

  const musicasBusca = musicas.filter(m =>
    m.nome.toLowerCase().includes(musicaBusca.toLowerCase()) ||
    m.artista.toLowerCase().includes(musicaBusca.toLowerCase())
  );

  const repertorioAtual = escalas.find(e=>e.id===sel?.id)?.repertorio || [];

  return (
    <div>
      {toast && <div className="toast" style={{background:'var(--dark2)',borderColor:'var(--gold)'}}>{toast}</div>}

      <div className="escalas-grid" style={{display:'grid',gridTemplateColumns:'220px 1fr',gap:14,alignItems:'start'}}>

        {/* COLUNA ESQUERDA — calendário + lista */}
        <div>
          <div className="card" style={{marginBottom:10}}>
            <div className="card-title">
              <div style={{display:'flex',gap:4}}>
                <button className={`btn btn-sm ${mesCal===6?'btn-gold':'btn-ghost'}`} onClick={()=>setMesCal(6)}>Jun</button>
                <button className={`btn btn-sm ${mesCal===7?'btn-gold':'btn-ghost'}`} onClick={()=>setMesCal(7)}>Jul</button>
              </div>
              <span>2025</span>
            </div>
            <div className="cal-grid">
              {dias.map(d=><div key={d} className="cal-th">{d}</div>)}
              {calDays.map((day,i)=>(
                <div key={i}
                  className={`cal-day ${day.other?'other':''} ${hasEscala(day.d)&&!day.other?'has-ev':''}`}
                  style={isCeia(day.d)&&!day.other?{color:'var(--gold)',fontWeight:700}:{}}
                  onClick={()=>{
                    if(day.other) return;
                    const e=escalas.find(e=>{const p=e.data.split('/');return parseInt(p[0])===day.d&&parseInt(p[1])===mesCal;});
                    if(e) selecionarEscala(e);
                  }}
                >{day.d}</div>
              ))}
            </div>
          </div>

          <div style={{fontSize:10,color:'var(--text4)',marginBottom:8,fontWeight:600,textTransform:'uppercase',letterSpacing:'0.8px'}}>Escalas</div>
          <div style={{display:'flex',flexDirection:'column',gap:2}}>
            {escalas.map(e=>(
              <div key={e.id}
                style={{padding:'7px 10px',borderRadius:8,cursor:'pointer',background:sel?.id===e.id?'var(--gold-bg)':'transparent',border:`0.5px solid ${sel?.id===e.id?'var(--border)':'transparent'}`,transition:'all 0.1s',display:'flex',alignItems:'center',gap:4}}
                onClick={()=>selecionarEscala(e)}
                onMouseEnter={ev=>{if(sel?.id!==e.id)ev.currentTarget.style.background='var(--border2)'}}
                onMouseLeave={ev=>{if(sel?.id!==e.id)ev.currentTarget.style.background='transparent'}}
              >
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:11,fontWeight:600,color:sel?.id===e.id?'var(--gold)':'var(--text)',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{e.data} {e.ceia?'✦':''}</div>
                  <div style={{fontSize:10,color:'var(--text3)'}}>{e.ministerio||e.dia}</div>
                </div>
                {isMinistro && sel?.id===e.id && (
                  <button style={{background:'none',border:'none',color:'var(--text3)',padding:2,cursor:'pointer',flexShrink:0}}
                    onClick={ev=>{ev.stopPropagation();abrirEditarEscala(e);}}>
                    <Icon name="edit" size={12}/>
                  </button>
                )}
              </div>
            ))}
          </div>
          {isMinistro && (
            <button className="btn btn-gold" style={{width:'100%',justifyContent:'center',marginTop:10}} onClick={abrirNovaEscala}>
              <Icon name="plus"/>Nova escala
            </button>
          )}
        </div>

        {/* COLUNA DIREITA — detalhe */}
        {sel ? (
          <div>
            {/* Header da escala */}
            <div style={{background:'var(--surface2)',border:'0.5px solid var(--border)',borderRadius:'var(--r-lg) var(--r-lg) 0 0',padding:'12px 16px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
              <div>
                <div style={{fontSize:14,fontWeight:700,color:'var(--text)'}}>{sel.dia} · {sel.data} {sel.ceia?<span className="tag tag-gold" style={{marginLeft:6}}>CEIA</span>:null}</div>
                <div style={{fontSize:11,color:'var(--text3)',marginTop:1}}>{sel.culto}</div>
              </div>
              <div style={{display:'flex',gap:6}}>
                <button className="btn btn-ghost btn-sm" onClick={()=>{ showToast('Repertório e escala enviados para a equipe!'); }}>
                  <Icon name="send" size={13}/>Notificar
                </button>
                {isMinistro && (
                  <button className="btn btn-ghost btn-sm" onClick={()=>abrirEditarEscala(sel)}>
                    <Icon name="edit" size={13}/>Editar
                  </button>
                )}
                {isAdmin && (
                  <button className="btn btn-danger btn-sm" onClick={()=>excluirEscalaLocal(sel.id)}>
                    <Icon name="trash" size={13}/>
                  </button>
                )}
              </div>
            </div>

            {/* Abas */}
            <div style={{display:'flex',background:'var(--surface)',borderLeft:'0.5px solid var(--border)',borderRight:'0.5px solid var(--border)',borderBottom:'0.5px solid var(--border2)'}}>
              {[{id:'time',label:'Time'},{id:'repertorio',label:`Repertório ${repertorioAtual.length>0?`(${repertorioAtual.length})`:''}` }].map(aba=>(
                <button key={aba.id}
                  style={{padding:'10px 18px',fontSize:13,fontWeight:aba.id===abaDir?600:400,color:aba.id===abaDir?'var(--gold)':'var(--text3)',background:'transparent',border:'none',borderBottom:aba.id===abaDir?'2px solid var(--gold)':'2px solid transparent',cursor:'pointer',transition:'all 0.12s'}}
                  onClick={()=>setAbaDir(aba.id)}
                >{aba.label}</button>
              ))}
            </div>

            {/* Conteúdo aba Time */}
            {abaDir==='time' && (
              <div style={{background:'var(--surface)',border:'0.5px solid var(--border)',borderTop:'none',borderRadius:'0 0 var(--r-lg) var(--r-lg)',padding:'14px 16px'}}>
                {[
                  {role:'Ministro(a)', val:sel.ministerio||'—'},
                  {role:'Vocal / Back', val:sel.vocal||'—'},
                  {role:'Baixo', val:sel.musicos.baixo||'—'},
                  {role:'Guitarra', val:sel.musicos.guitarra||'—'},
                  {role:'Teclado', val:sel.musicos.teclado||'—'},
                  {role:'Bateria', val:sel.musicos.bateria||'—'},
                ].map((r,i)=>(
                  <div key={i} className="escala-row">
                    <div className="escala-role-label">{r.role}</div>
                    <div className="escala-names">{r.val}</div>
                  </div>
                ))}
              </div>
            )}

            {/* Conteúdo aba Repertório */}
            {abaDir==='repertorio' && (
              <div style={{background:'var(--surface)',border:'0.5px solid var(--border)',borderTop:'none',borderRadius:'0 0 var(--r-lg) var(--r-lg)',padding:'14px 16px'}}>
                {repertorioAtual.length === 0 ? (
                  <div style={{textAlign:'center',padding:'24px 0',color:'var(--text3)',fontSize:13}}>
                    Nenhuma música ainda.<br/>
                    <span style={{fontSize:12}}>Adicione músicas do repertório abaixo.</span>
                  </div>
                ) : (
                  repertorioAtual.map((entrada, i) => (
                    <div key={entrada.id} style={{display:'flex',alignItems:'center',gap:10,padding:'8px 0',borderBottom:'0.5px solid var(--border2)'}}>
                      <div style={{width:20,textAlign:'center',fontSize:12,color:'var(--text4)',flexShrink:0}}>{i+1}</div>
                      <div className="musica-cover" style={{width:30,height:30,borderRadius:6,flexShrink:0}}><Icon name="music" size={13}/></div>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontSize:13,fontWeight:500,color:'var(--text)',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{entrada.nome}</div>
                        <div style={{fontSize:11,color:'var(--text3)'}}>{entrada.artista}</div>
                      </div>

                      {/* Tom — clicável para editar */}
                      {editTom?.id === entrada.id ? (
                        <div style={{display:'flex',gap:4,flexWrap:'wrap',maxWidth:240,alignItems:'center'}}>
                          {TONS.map(t=>(
                            <button key={t}
                              className={`tom-key ${entrada.tom===t?'active':''}`}
                              style={{width:30,height:28,fontSize:10,borderRadius:6}}
                              onClick={()=>alterarTom(entrada,t)}
                            >{t}</button>
                          ))}
                          <button className="btn btn-ghost btn-sm" style={{marginLeft:2}} onClick={()=>setEditTom(null)}>
                            <Icon name="x" size={12}/>
                          </button>
                        </div>
                      ) : (
                        <button
                          className="tom-pill"
                          style={{cursor:'pointer',border:'0.5px solid transparent',transition:'all 0.12s'}}
                          title="Clique para alterar o tom"
                          onClick={()=>setEditTom({id:entrada.id})}
                          onMouseEnter={ev=>{ev.currentTarget.style.borderColor='var(--gold)';ev.currentTarget.style.opacity='0.8';}}
                          onMouseLeave={ev=>{ev.currentTarget.style.borderColor='transparent';ev.currentTarget.style.opacity='1';}}
                        >{entrada.tom} ✎</button>
                      )}

                      <button className="stem-mute" style={{flexShrink:0}} title="Remover do repertório" onClick={()=>removerMusica(entrada)}>
                        <Icon name="trash" size={13} style={{color:'var(--coral)'}}/>
                      </button>
                    </div>
                  ))
                )}

                <button className="btn btn-gold" style={{width:'100%',justifyContent:'center',marginTop:12}} onClick={()=>setModalMusica(true)}>
                  <Icon name="plus"/>Adicionar música
                </button>
                {repertorioAtual.length > 0 && (
                  <button className="btn btn-ghost" style={{width:'100%',justifyContent:'center',marginTop:8}} onClick={()=>notificarRepertorio(selAtual, repertorioAtual)}>
                    <Icon name="send"/>Notificar equipe com repertório
                  </button>
                )}
              </div>
            )}
          </div>
        ) : (
          <div className="card" style={{textAlign:'center',padding:'40px',color:'var(--text3)'}}>
            <Icon name="calendar" size={32} style={{color:'var(--text4)',marginBottom:8}}/>
            <div>Selecione uma escala</div>
          </div>
        )}
      </div>

      {/* Modal — adicionar música */}
      {modalMusica && (
        <div className="modal-overlay" onClick={e=>{if(e.target.classList.contains('modal-overlay')){setModalMusica(false);setMusicaBusca('');}}}>
          <div className="modal">
            <div className="modal-title">
              Adicionar ao repertório
              <button className="btn btn-ghost btn-sm" onClick={()=>{setModalMusica(false);setMusicaBusca('');}}><Icon name="x"/></button>
            </div>

            </div>
            <div style={{maxHeight:320,overflowY:'auto',display:'flex',flexDirection:'column',gap:4}}>

                  <div key={m.id}
                    style={{display:'flex',alignItems:'center',gap:10,padding:'9px 10px',borderRadius:8,cursor:jaAdicionada?'default':'pointer',background:'var(--surface)',border:'0.5px solid var(--border)',opacity:jaAdicionada?0.45:1,transition:'border-color 0.1s'}}
                    onMouseEnter={ev=>{if(!jaAdicionada)ev.currentTarget.style.borderColor='var(--gold)';}}
                    onMouseLeave={ev=>{ev.currentTarget.style.borderColor='var(--border)';}}

        <div className="modal-overlay" onClick={e=>{if(e.target.classList.contains('modal-overlay'))setModalEscala(false)}}>

              {editandoEscala?'Editar escala':'Nova escala'}

            <div className="grid-2">

            <div className="grid-2">

                <label className="form-label">CEIA?</label>
                <div style={{display:'flex',gap:8,marginTop:6}}>
                  {[{v:false,l:'Não'},{v:true,l:'Sim ✦'}].map(op=>(
                    <button key={String(op.v)} className={`btn btn-sm ${formEscala.ceia===op.v?'btn-gold':'btn-ghost'}`}
                      onClick={()=>setFormEscala(f=>({...f,ceia:op.v}))}>{op.l}</button>

            </div>
            <div className="form-group">

              <select className="form-select" value={formEscala.ministerio} onChange={e=>setFormEscala(f=>({...f,ministerio:e.target.value}))}>

            <div className="form-group">
              <label className="form-label">Vocal / Back (separe por " - ")</label>
              <input className="form-input" placeholder="Ex: Fran - Hilma - Lucimara"
                value={formEscala.vocal} onChange={e=>setFormEscala(f=>({...f,vocal:e.target.value}))}/>
            </div>
            <div style={{fontSize:11,color:'var(--text3)',marginBottom:8,fontWeight:600,textTransform:'uppercase',letterSpacing:'0.8px'}}>Músicos</div>
            <div className="grid-2">
              {['baixo','guitarra','teclado','bateria'].map(inst=>(
                <div key={inst} className="form-group">
                  <label className="form-label" style={{textTransform:'capitalize'}}>{inst}</label>
                  <select className="form-select" value={formEscala.musicos[inst]||''}
                    onChange={e=>setFormEscala(f=>({...f,musicos:{...f.musicos,[inst]:e.target.value}}))}>
                    <option value="">— Selecionar —</option>
                    {NOMES.map(n=><option key={n}>{n}</option>)}
                  </select>
                </div>
              ))}
            </div>
            <div style={{display:'flex',gap:8,justifyContent:'flex-end',marginTop:4}}>
              <button className="btn btn-ghost" onClick={()=>setModalEscala(false)}>Cancelar</button>
              <button className="btn btn-gold" onClick={salvarEscalaLocal} disabled={salvandoEscala}>
                <Icon name="check"/>{salvandoEscala?'Salvando...':(editandoEscala?'Salvar':'Criar escala')}

            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function PageMusicas({ musicas, setMusicas, salvarMusica, excluirMusica, onPlay, onPlayMusica, usuario }) {
  const isAdmin    = usuario?.acesso === 'admin';
  const isMinistro = isAdmin || usuario?.acesso === 'ministro';

  const [busca, setBusca]       = useState('');
  const [modal, setModal]       = useState(false);
  const [aba, setAba]           = useState('youtube'); // 'youtube' | 'manual'
  const [ytBusca, setYtBusca]   = useState('');
  const [ytResultados, setYtResultados] = useState([]);
  const [ytCarregando, setYtCarregando] = useState(false);
  const [ytErro, setYtErro]     = useState('');
  const [ytSel, setYtSel]       = useState(null);
  const [editando, setEditando] = useState(null);
  const [form, setForm]         = useState({ nome:'', artista:'', tom:'Ré', bpm:'', youtubeId:'', capa:'' });
  const [tomSel, setTomSel]     = useState(null);
  const [toast, setToast]       = useState('');
  const ytTimer                 = useRef(null);
  const showToast = msg => { setToast(msg); setTimeout(()=>setToast(''),2500); };

  const filtradas = musicas.filter(m =>
    m.nome.toLowerCase().includes(busca.toLowerCase()) ||
    m.artista.toLowerCase().includes(busca.toLowerCase())
  );

  // ── Busca YouTube direto com API Key ─────────────────────────
  const buscarYouTube = async (q) => {
    if (!q.trim()) { setYtResultados([]); return; }
    setYtCarregando(true);
    setYtErro('');
    try {
      // 1. Busca vídeos
      const searchRes = await fetch(
        `https://www.googleapis.com/youtube/v3/search?part=snippet&q=${encodeURIComponent(q + ' louvor gospel')}&type=video&maxResults=8&key=${YOUTUBE_API_KEY}&relevanceLanguage=pt`
      );
      const searchData = await searchRes.json();
      if (!searchRes.ok) throw new Error(searchData.error?.message ?? 'Erro na busca');

      const videoIds = searchData.items.map(i => i.id.videoId).join(',');

      // 2. Busca durações
      const detailRes = await fetch(
        `https://www.googleapis.com/youtube/v3/videos?part=contentDetails&id=${videoIds}&key=${YOUTUBE_API_KEY}`
      );
      const detailData = await detailRes.json();
      const duracoes = {};
      for (const item of detailData.items ?? []) {
        const iso = item.contentDetails.duration;
        const m = iso.match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/);
        if (m) {
          const h = parseInt(m[1]||'0'), min = parseInt(m[2]||'0'), s = parseInt(m[3]||'0');
          duracoes[item.id] = `${h*60+min}:${s.toString().padStart(2,'0')}`;
        }
      }

      const items = searchData.items.map(item => ({
        id:      item.id.videoId,
        titulo:  item.snippet.title,
        canal:   item.snippet.channelTitle,
        thumb:   item.snippet.thumbnails.medium?.url ?? item.snippet.thumbnails.default?.url,
        duracao: duracoes[item.id.videoId] ?? '?:??',
      }));

      setYtResultados(items);
    } catch(e) {
      setYtErro(`Erro: ${e.message}`);
      setYtResultados([]);
    } finally {
      setYtCarregando(false);
    }
  };

  // Debounce da busca
  const onYtBusca = (v) => {
    setYtBusca(v);
    setYtSel(null);
    clearTimeout(ytTimer.current);
    ytTimer.current = setTimeout(() => buscarYouTube(v), 600);
  };

  // Seleciona resultado do YouTube
  const selecionarYt = (item) => {
    setYtSel(item);
    // Tenta extrair nome e artista do título
    const partes = item.titulo.split(' - ');
    const nome   = partes[0]?.trim() || item.titulo;
    const artista = partes[1]?.trim() || item.canal;
    setForm(f => ({ ...f, nome, artista, youtubeId: item.id, capa: item.thumb }));
  };

  const abrirNovo = () => {
    setEditando(null);
    setForm({ nome:'', artista:'', tom:'Ré', bpm:'', youtubeId:'', capa:'' });
    setYtBusca(''); setYtResultados([]); setYtSel(null); setYtErro('');
    setAba('youtube');
    setModal(true);
  };

  const abrirEditar = (m) => {
    setEditando(m);
    setForm({ nome:m.nome, artista:m.artista, tom:m.tom, bpm:m.bpm||'', youtubeId:m.youtubeId||'', capa:m.capa||'' });
    setAba('manual');
    setModal(true);
  };

  const [salvando, setSalvando] = useState(false);

  const salvar = async () => {
    if (!form.nome.trim()) return;
    setSalvando(true);
    try {
      const musica = { ...(editando||{}), ...form, bpm:parseInt(form.bpm)||0 };
      await salvarMusica(musica);
      showToast(editando ? 'Música atualizada!' : `"${form.nome}" adicionada!`);
      setModal(false);
    } catch(e) { showToast('Erro: '+e.message); }
    finally { setSalvando(false); }
  };

  const excluir = async (id) => {
    await excluirMusica(id);
    showToast('Música removida.');
  };

  return (
    <div>
      {toast && <div className="toast">{toast}</div>}

      <div style={{display:'flex',gap:8,marginBottom:16}}>
        <div className="search-wrap" style={{flex:1}}>
          <Icon name="search"/>
          <input className="search-input" style={{width:'100%'}} placeholder="Buscar no repertório..."
            value={busca} onChange={e=>setBusca(e.target.value)}/>
        </div>
        {isMinistro && (
          <button className="btn btn-gold" onClick={abrirNovo}>
            <Icon name="plus"/>Adicionar
          </button>
        )}
      </div>

      <div className="card">
        <div className="card-title">Repertório <span>{filtradas.length} músicas</span></div>
        {filtradas.map((m,i) => (
          <div key={m.id} className="musica-row">
            <div className="musica-num">{i+1}</div>
            {m.capa
              ? <img src={m.capa} alt="" style={{width:36,height:36,borderRadius:6,objectFit:'cover',flexShrink:0}}/>
              : <div className="musica-cover"><Icon name="music"/></div>
            }
            <div className="musica-info" style={{cursor:'pointer'}} onClick={()=>onPlayMusica(m)}>
              <div className="musica-name">{m.nome}</div>
              <div className="musica-artist">{m.artista}{m.bpm ? ` · ${m.bpm} bpm` : ''}</div>
            </div>
            <span className="tom-pill">{m.tom}</span>
            {/* Botão play */}
            <button
              onClick={()=>onPlayMusica(m)}
              style={{width:30,height:30,borderRadius:'50%',background:'var(--gold)',border:'none',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',flexShrink:0}}
              title="Ouvir"
            >
              <Icon name="play" size={12} style={{color:'var(--dark)'}}/>
            </button>
            {isMinistro && (
              <button className="stem-mute" title="Editar" onClick={()=>abrirEditar(m)}>
                <Icon name="edit" size={12} style={{color:'var(--text3)'}}/>
              </button>
            )}
            {isAdmin && (
              <button className="stem-mute" title="Remover" onClick={()=>excluir(m.id)}>
                <Icon name="trash" size={12} style={{color:'var(--coral)'}}/>
              </button>
            )}
          </div>
        ))}
        {filtradas.length===0 && (
          <div style={{textAlign:'center',padding:24,color:'var(--text3)',fontSize:13}}>
            Nenhuma música encontrada.
          </div>
        )}
      </div>

      <div className="card" style={{marginTop:14}}>
        <div className="card-title">Seletor de tom rápido</div>
        <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
          {TONS.map(t=>(
            <button key={t} className={`tom-key ${tomSel===t?'active':''}`}
              onClick={()=>setTomSel(t===tomSel?null:t)}>{t}</button>
          ))}
        </div>
        {tomSel && (
          <div style={{marginTop:12,fontSize:12,color:'var(--text2)'}}>
            Tom selecionado: <strong style={{color:'var(--gold)'}}>{tomSel}</strong> — compartilhe com o time.
          </div>
        )}
      </div>

      {/* ── Modal adicionar / editar ── */}
      {modal && (
        <div className="modal-overlay" onClick={e=>{if(e.target.classList.contains('modal-overlay'))setModal(false)}}>
          <div className="modal" style={{maxWidth:560}}>
            <div className="modal-title">
              {editando?'Editar música':'Adicionar música'}
              <button className="btn btn-ghost btn-sm" onClick={()=>setModal(false)}><Icon name="x"/></button>
            </div>

            {/* Abas */}
            {!editando && (
              <div style={{display:'flex',borderBottom:'0.5px solid var(--border2)',marginBottom:16}}>
                {[{id:'youtube',label:'🔴 Buscar no YouTube'},{id:'manual',label:'✏️ Manual'}].map(a=>(
                  <button key={a.id}
                    style={{padding:'8px 16px',fontSize:13,fontWeight:aba===a.id?600:400,color:aba===a.id?'var(--gold)':'var(--text3)',background:'transparent',border:'none',borderBottom:aba===a.id?'2px solid var(--gold)':'2px solid transparent',cursor:'pointer'}}
                    onClick={()=>setAba(a.id)}
                  >{a.label}</button>
                ))}
              </div>
            )}

            {/* ABA YOUTUBE */}
            {aba==='youtube' && !editando && (
              <div>
                <div className="search-wrap" style={{marginBottom:12}}>
                  <Icon name="search"/>
                  <input className="search-input" style={{width:'100%'}}
                    placeholder="Ex: Oceanos Hillsong, Lugar Secreto..."
                    value={ytBusca} onChange={e=>onYtBusca(e.target.value)} autoFocus/>
                </div>

                {ytCarregando && (
                  <div style={{textAlign:'center',padding:20,color:'var(--text3)',fontSize:13}}>
                    Buscando...
                  </div>
                )}

                {ytErro && (
                  <div style={{fontSize:11,color:'var(--coral)',marginBottom:8,padding:'8px 10px',background:'var(--coral-bg)',borderRadius:6}}>
                    {ytErro}
                  </div>
                )}

                {/* Resultados */}
                <div style={{maxHeight:280,overflowY:'auto',display:'flex',flexDirection:'column',gap:6}}>
                  {ytResultados.map(item=>(
                    <div key={item.id}
                      onClick={()=>selecionarYt(item)}
                      style={{display:'flex',alignItems:'center',gap:10,padding:'8px 10px',borderRadius:8,cursor:'pointer',border:`1.5px solid ${ytSel?.id===item.id?'var(--gold)':'var(--border)'}`,background:ytSel?.id===item.id?'var(--gold-bg)':'var(--surface2)',transition:'all 0.1s'}}
                    >
                      <img src={item.thumb} alt="" style={{width:64,height:36,borderRadius:4,objectFit:'cover',flexShrink:0}}/>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontSize:12,fontWeight:500,color:'var(--text)',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{item.titulo}</div>
                        <div style={{fontSize:11,color:'var(--text3)'}}>{item.canal} · {item.duracao}</div>
                      </div>
                      {ytSel?.id===item.id && <span className="tag tag-gold" style={{flexShrink:0}}>✓</span>}
                    </div>
                  ))}
                  {!ytCarregando && ytBusca && ytResultados.length===0 && (
                    <div style={{textAlign:'center',padding:20,color:'var(--text3)',fontSize:13}}>
                      Nenhum resultado. Tente outro termo.
                    </div>
                  )}
                  {!ytBusca && (
                    <div style={{textAlign:'center',padding:20,color:'var(--text3)',fontSize:12}}>
                      Digite o nome da música para buscar no YouTube
                    </div>
                  )}
                </div>

                {/* Preview e form após seleção */}
                {ytSel && (
                  <div style={{marginTop:14,paddingTop:14,borderTop:'0.5px solid var(--border2)'}}>
                    <div style={{fontSize:11,color:'var(--text3)',marginBottom:10}}>Ajuste os detalhes antes de salvar:</div>
                    <div className="grid-2" style={{marginBottom:10}}>
                      <div className="form-group">
                        <label className="form-label">Nome da música</label>
                        <input className="form-input" value={form.nome} onChange={e=>setForm(f=>({...f,nome:e.target.value}))}/>
                      </div>
                      <div className="form-group">
                        <label className="form-label">Artista</label>
                        <input className="form-input" value={form.artista} onChange={e=>setForm(f=>({...f,artista:e.target.value}))}/>
                      </div>
                    </div>
                    <div className="grid-2">
                      <div className="form-group">
                        <label className="form-label">Tom</label>
                        <select className="form-select" value={form.tom} onChange={e=>setForm(f=>({...f,tom:e.target.value}))}>
                          {TONS.map(t=><option key={t}>{t}</option>)}
                        </select>
                      </div>
                      <div className="form-group">
                        <label className="form-label">BPM</label>
                        <input className="form-input" type="number" placeholder="opcional" value={form.bpm} onChange={e=>setForm(f=>({...f,bpm:e.target.value}))}/>
                      </div>
                    </div>
                  </div>
                )}
              </div>
            )}

            {/* ABA MANUAL */}
            {(aba==='manual' || editando) && (
              <div>
                <div className="form-group">
                  <label className="form-label">Nome da música</label>
                  <input className="form-input" placeholder="Ex: Oceanos"
                    value={form.nome} onChange={e=>setForm(f=>({...f,nome:e.target.value}))} autoFocus={!editando}/>
                </div>
                <div className="form-group">
                  <label className="form-label">Artista / Ministério</label>
                  <input className="form-input" placeholder="Ex: Hillsong"
                    value={form.artista} onChange={e=>setForm(f=>({...f,artista:e.target.value}))}/>
                </div>
                <div className="grid-2">
                  <div className="form-group">
                    <label className="form-label">Tom</label>
                    <select className="form-select" value={form.tom} onChange={e=>setForm(f=>({...f,tom:e.target.value}))}>
                      {TONS.map(t=><option key={t}>{t}</option>)}
                    </select>
                  </div>
                  <div className="form-group">
                    <label className="form-label">BPM</label>
                    <input className="form-input" type="number" placeholder="opcional"
                      value={form.bpm} onChange={e=>setForm(f=>({...f,bpm:e.target.value}))}/>
                  </div>
                </div>
                <div className="form-group">
                  <label className="form-label">ID do YouTube (opcional)</label>
                  <input className="form-input" placeholder="Ex: aHjpOzsQ9YI"
                    value={form.youtubeId} onChange={e=>setForm(f=>({...f,youtubeId:e.target.value}))}/>
                  <div style={{fontSize:10,color:'var(--text3)',marginTop:4}}>
                    O ID é a parte após "v=" na URL do YouTube
                  </div>
                </div>
              </div>
            )}

            <div style={{display:'flex',gap:8,justifyContent:'flex-end',marginTop:16}}>
              <button className="btn btn-ghost" onClick={()=>setModal(false)}>Cancelar</button>
              <button className="btn btn-gold"
                onClick={salvar}
                disabled={!form.nome.trim() && !(ytSel && form.nome)}
                style={{opacity:(!form.nome.trim()&&!ytSel)?0.4:1}}
              >
                <Icon name="check"/>{editando?'Salvar':'Adicionar'}
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}
